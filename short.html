<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>x8 workspace</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #060608;
            --surface: rgba(255,255,255,0.03);
            --surface-hover: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.07);
            --border-bright: rgba(255,255,255,0.22);
            --accent: #f0c060;
            --accent-dim: rgba(240,192,96,0.13);
            --accent-glow: rgba(240,192,96,0.35);
            --blue: #80d4ff;
            --blue-dim: rgba(128,212,255,0.1);
            --green: #7de8b0;
            --green-dim: rgba(125,232,176,0.1);
            --red: #ff7070;
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.32);
            --text-sub: rgba(255,255,255,0.55);
            --radius: 20px;
            --radius-sm: 12px;
            --radius-xs: 8px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            width: 100vw; height: 100vh;
            overflow: hidden;
            perspective: 1200px;
        }

        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            opacity: 0.55;
        }

        .glow-blob { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 1; }
        .glow-blob-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(240,192,96,0.065) 0%, transparent 70%); top: -160px; right: -100px; }
        .glow-blob-2 { width: 420px; height: 420px; background: radial-gradient(circle, rgba(100,120,255,0.05) 0%, transparent 70%); bottom: -110px; left: -80px; }

        /* CANVAS & BG */
        #connections-canvas {
            position: fixed; top: -20%; left: -20%;
            width: 140%; height: 140%;
            z-index: 2; pointer-events: none; transition: opacity 0.5s;
        }
        #universe-bg {
            position: fixed; inset: 0; z-index: 3;
            transition: filter 0.6s ease, transform 0.12s ease-out;
            transform-style: preserve-3d;
            filter: blur(18px) brightness(0.55);
        }
        body.bg-focused #universe-bg { filter: blur(0px) brightness(1); }
        body.bg-focused #main-frame { filter: blur(30px); transform: translate(-50%, -50%) scale(0.9); opacity: 0.15; cursor: pointer; }
        body.bg-focused #topbar { opacity: 0.12; }

        /* TOPBAR */
        #topbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 200;
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 26px; transition: opacity 0.5s;
        }
        .logo {
            font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700;
            color: var(--text-muted); letter-spacing: 0.1em;
            display: flex; align-items: center; gap: 10px;
        }
        .logo-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--accent); box-shadow: 0 0 10px var(--accent-glow);
            animation: blink 2.8s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.6)} }

        .topbar-right { display: flex; align-items: center; gap: 8px; }
        .count-badge {
            font-family: 'Space Mono', monospace; font-size: 10px;
            color: var(--text-muted); padding: 4px 10px;
            background: var(--surface); border: 1px solid var(--border); border-radius: 7px;
        }
        .icon-btn {
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text-muted); width: 40px; height: 40px; border-radius: 11px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 17px; transition: all 0.2s;
        }
        .icon-btn:hover { background: var(--surface-hover); border-color: var(--border-bright); color: var(--text); }
        .icon-btn.active { background: var(--accent-dim); border-color: rgba(240,192,96,0.4); color: var(--accent); }

        /* MAIN FRAME */
        #main-frame {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 500px; max-width: calc(100vw - 28px);
            z-index: 100;
            transition: all 0.55s cubic-bezier(0.19,1,0.22,1);
        }
        .frame-inner {
            background: rgba(7,7,10,0.88);
            border: 1px solid var(--border);
            border-top-color: rgba(255,255,255,0.11);
            border-radius: var(--radius);
            backdrop-filter: blur(70px);
            -webkit-backdrop-filter: blur(70px);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.02), 0 60px 120px -20px rgba(0,0,0,0.97), inset 0 1px 0 rgba(255,255,255,0.05);
            overflow: hidden;
        }

        /* frame topbar */
        .frame-topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 22px 0;
        }
        .frame-brand {
            font-family: 'Space Mono', monospace; font-size: 10px;
            color: var(--text-muted); letter-spacing: 0.12em; text-transform: uppercase;
        }
        .frame-indicators { display: flex; align-items: center; gap: 5px; }
        .fi { width: 8px; height: 8px; border-radius: 50%; }
        .fi-red { background: #ff5f5a; }
        .fi-yellow { background: #febc2e; }
        .fi-green { background: #28c840; }

        /* TABS */
        .tab-bar {
            display: flex; gap: 2px; padding: 14px 22px 0;
        }
        .tab {
            padding: 8px 14px; border-radius: var(--radius-xs);
            font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
            cursor: pointer; color: var(--text-muted);
            display: flex; align-items: center; gap: 6px;
            transition: all 0.2s; user-select: none;
            background: transparent; border: 1px solid transparent;
        }
        .tab:hover { color: var(--text-sub); background: var(--surface); }
        .tab.active { color: var(--accent); background: var(--accent-dim); border-color: rgba(240,192,96,0.2); }
        .tab.active.blue-tab { color: var(--blue); background: var(--blue-dim); border-color: rgba(128,212,255,0.2); }
        .tab.active.green-tab { color: var(--green); background: var(--green-dim); border-color: rgba(125,232,176,0.2); }
        .tab i { font-size: 13px; }

        /* TAB PANELS */
        .tab-panel { display: none; padding: 16px 22px 0; }
        .tab-panel.active { display: block; }

        /* INPUTS */
        .field { position: relative; margin-bottom: 10px; }
        .field-label {
            font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
            color: var(--text-muted); text-transform: uppercase;
            margin-bottom: 6px; display: block;
        }
        .field-icon {
            position: absolute; left: 13px; bottom: 13px;
            color: var(--text-muted); font-size: 16px; pointer-events: none;
            transition: color 0.2s;
        }
        .field:focus-within .field-icon { color: var(--accent); }
        .field.blue-field:focus-within .field-icon { color: var(--blue); }
        .field.green-field:focus-within .field-icon { color: var(--green); }

        input[type="text"], textarea {
            width: 100%;
            background: rgba(255,255,255,0.025);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 13px 12px 38px;
            color: var(--text); font-family: 'Space Mono', monospace;
            font-size: 12px; outline: none; resize: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        }
        input[type="text"]:focus, textarea:focus {
            border-color: rgba(240,192,96,0.45);
            background: rgba(240,192,96,0.025);
            box-shadow: 0 0 0 3px rgba(240,192,96,0.07);
        }
        .blue-field input[type="text"]:focus, .blue-field textarea:focus {
            border-color: rgba(128,212,255,0.4);
            background: rgba(128,212,255,0.02);
            box-shadow: 0 0 0 3px rgba(128,212,255,0.07);
        }
        .green-field input[type="text"]:focus {
            border-color: rgba(125,232,176,0.4);
            background: rgba(125,232,176,0.02);
            box-shadow: 0 0 0 3px rgba(125,232,176,0.07);
        }
        input::placeholder, textarea::placeholder { color: var(--text-muted); }
        textarea { min-height: 85px; line-height: 1.7; padding-top: 12px; }

        /* slug row */
        .slug-row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 10px; }
        .slug-row .field { flex: 1; margin-bottom: 0; }
        .slug-prefix {
            font-family: 'Space Mono', monospace; font-size: 10px;
            color: var(--text-muted); padding-bottom: 15px;
            white-space: nowrap; flex-shrink: 0;
        }

        /* char counter */
        .textarea-wrap { position: relative; }
        .char-count {
            position: absolute; bottom: 10px; right: 12px;
            font-family: 'Space Mono', monospace; font-size: 9px;
            color: var(--text-muted); pointer-events: none;
            transition: color 0.2s;
        }
        .char-count.warn { color: var(--accent); }
        .char-count.over { color: var(--red); }

        /* url validator */
        .url-status {
            display: flex; align-items: center; gap: 6px;
            font-size: 10px; font-family: 'Space Mono', monospace;
            margin-top: -4px; margin-bottom: 8px; min-height: 18px;
            color: var(--text-muted); padding-left: 2px;
            transition: all 0.2s;
        }
        .url-status.valid { color: var(--green); }
        .url-status.invalid { color: var(--red); }
        .url-status i { font-size: 12px; }

        /* ADVANCED TOGGLE */
        .adv-toggle {
            display: flex; align-items: center; gap: 7px;
            font-size: 10px; color: var(--text-muted); cursor: pointer;
            margin-bottom: 10px; user-select: none; width: fit-content;
            transition: color 0.2s;
        }
        .adv-toggle:hover { color: var(--accent); }
        .adv-toggle i { font-size: 12px; transition: transform 0.2s; }
        .adv-toggle.open i { transform: rotate(90deg); }
        .adv-panel { display: none; }
        .adv-panel.open { display: block; }

        /* BUTTONS */
        .action-row { display: flex; gap: 8px; padding: 14px 22px 20px; }
        .btn {
            flex: 1; padding: 13px 16px; border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            gap: 7px; transition: all 0.22s; letter-spacing: 0.05em;
        }
        .btn:active { transform: scale(0.96) !important; }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: #080808; }
        .btn-primary:hover { background: #f8d47a; box-shadow: 0 8px 28px -4px var(--accent-glow); transform: translateY(-2px); }
        .btn-blue { background: var(--blue-dim); border-color: rgba(128,212,255,0.25); color: var(--blue); }
        .btn-blue:hover { background: rgba(128,212,255,0.18); border-color: var(--blue); transform: translateY(-2px); }
        .btn-green { background: var(--green-dim); border-color: rgba(125,232,176,0.25); color: var(--green); }
        .btn-green:hover { background: rgba(125,232,176,0.18); border-color: var(--green); transform: translateY(-2px); }
        .btn-ghost { background: var(--surface); color: var(--text-sub); }
        .btn-ghost:hover { background: var(--surface-hover); border-color: var(--border-bright); color: var(--text); }
        .btn-icon { flex: 0; padding: 13px; width: 46px; }

        /* RESULT BOX */
        .result-box {
            margin: 0 22px 16px;
            background: rgba(240,192,96,0.04);
            border: 1px solid rgba(240,192,96,0.18);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            display: none; animation: slideIn 0.3s cubic-bezier(0.23,1,0.32,1);
        }
        .result-box.visible { display: block; }
        @keyframes slideIn { from { opacity:0; transform: translateY(-8px); } to { opacity:1; transform: translateY(0); } }
        .result-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--accent); margin-bottom: 8px; opacity: 0.7; }
        .result-content {
            font-family: 'Space Mono', monospace; font-size: 12px;
            color: var(--text); word-break: break-all; line-height: 1.6;
        }
        .result-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
        .result-btn {
            padding: 6px 12px; border-radius: 7px; border: 1px solid var(--border);
            background: var(--surface); color: var(--text-sub);
            font-size: 10px; font-family: 'Syne', sans-serif; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.2s;
            letter-spacing: 0.05em;
        }
        .result-btn:hover { background: var(--surface-hover); border-color: var(--border-bright); color: var(--text); }
        .result-btn.accent-btn { color: var(--accent); border-color: rgba(240,192,96,0.25); background: var(--accent-dim); }
        .result-btn.accent-btn:hover { border-color: var(--accent); }

        /* QR MODAL */
        #qr-modal {
            display: none; position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            align-items: center; justify-content: center;
        }
        #qr-modal.show { display: flex; }
        .qr-box {
            background: rgba(8,8,12,0.97);
            border: 1px solid var(--border-bright); border-radius: var(--radius);
            padding: 32px; text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
            animation: popIn 0.3s cubic-bezier(0.23,1,0.32,1);
        }
        @keyframes popIn { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }
        .qr-box img { border-radius: var(--radius-sm); display: block; margin: 0 auto 14px; }
        .qr-label { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-muted); margin-bottom: 16px; word-break: break-all; max-width: 220px; }
        .qr-close { cursor: pointer; color: var(--text-muted); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; font-family: 'Space Mono', monospace; }
        .qr-close:hover { color: var(--text); }

        /* DIVIDER */
        .divider { height: 1px; background: var(--border); }

        /* RECENT STRIP */
        .recent-strip { padding: 12px 22px 16px; }
        .recent-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 9px;
        }
        .recent-title {
            font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
            color: var(--text-muted); text-transform: uppercase;
            display: flex; align-items: center; gap: 6px;
        }
        .recent-count {
            font-family: 'Space Mono', monospace; font-size: 9px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 5px; padding: 2px 7px; color: var(--text-muted);
        }
        .recent-list { display: flex; flex-direction: column; gap: 5px; }
        .recent-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 11px; border-radius: var(--radius-xs);
            background: var(--surface); border: 1px solid transparent;
            cursor: pointer; transition: all 0.18s;
        }
        .recent-item:hover { background: var(--surface-hover); border-color: var(--border); }
        .recent-badge {
            font-family: 'Space Mono', monospace; font-size: 8px; font-weight: 700;
            letter-spacing: 0.1em; padding: 2px 7px; border-radius: 5px; flex-shrink: 0;
        }
        .badge-link { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(240,192,96,0.2); }
        .badge-text { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(128,212,255,0.2); }
        .recent-val {
            font-family: 'Space Mono', monospace; font-size: 11px;
            color: var(--text-sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
        }
        .recent-copy { color: var(--text-muted); font-size: 14px; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; }
        .recent-item:hover .recent-copy { opacity: 1; }
        .recent-time {
            font-family: 'Space Mono', monospace; font-size: 9px;
            color: var(--text-muted); flex-shrink: 0; white-space: nowrap;
        }
        .node-time {
            font-family: 'Space Mono', monospace; font-size: 9px;
            color: var(--text-muted); margin-top: 7px;
            display: flex; align-items: center; gap: 4px;
        }
        .node-time i { font-size: 10px; }
        .frame-clock {
            font-family: 'Space Mono', monospace; font-size: 10px;
            color: var(--accent); letter-spacing: 0.08em;
            background: var(--accent-dim); border: 1px solid rgba(240,192,96,0.18);
            padding: 3px 9px; border-radius: 6px;
        }

        /* fetch empty */
        .fetch-empty {
            font-family: 'Space Mono', monospace; font-size: 11px;
            color: var(--text-muted); text-align: center; padding: 16px 0;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .fetch-empty i { font-size: 26px; opacity: 0.3; }

        /* TOAST */
        #toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(70px);
            z-index: 9998;
            background: rgba(8,8,12,0.97);
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            padding: 11px 18px; display: flex; align-items: center; gap: 10px;
            font-size: 12px; font-family: 'Space Mono', monospace;
            white-space: nowrap; backdrop-filter: blur(30px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.85);
            transition: transform 0.4s cubic-bezier(0.19,1,0.22,1), opacity 0.4s;
            opacity: 0;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast-icon { font-size: 15px; }
        .toast-text { color: var(--text-sub); }
        .toast-value { color: var(--accent); font-weight: 700; cursor: pointer; }
        #toast.toast-push .toast-value { color: var(--blue); }
        #toast.toast-error .toast-value { color: var(--red); }
        #toast.toast-copy .toast-value { color: var(--green); }

        /* NODES */
        .history-node {
            position: absolute;
            background: rgba(8,8,12,0.9);
            border: 1px solid var(--border); border-radius: 16px;
            padding: 14px 16px; width: 230px;
            backdrop-filter: blur(20px); cursor: pointer;
            transition: all 0.5s cubic-bezier(0.23,1,0.32,1);
        }
        .history-node:hover {
            border-color: var(--accent);
            box-shadow: 0 0 40px -10px var(--accent-glow);
            transform: scale(1.08) translateZ(60px) !important; z-index: 1000;
        }
        .node-type {
            font-size: 9px; text-transform: uppercase; letter-spacing: 0.15em;
            margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
        }
        .node-type.link { color: var(--accent); }
        .node-type.text { color: var(--blue); }
        .node-content {
            font-family: 'Space Mono', monospace; font-size: 11px;
            color: var(--text-sub); line-height: 1.6; word-break: break-all;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .node-floor {
            display: none; position: absolute; left: -52px; top: 50%; transform: translateY(-50%);
            font-size: 22px; font-weight: 800; color: rgba(255,255,255,0.07);
            font-family: 'Space Mono', monospace;
        }

        /* ELEVATOR */
        body.elevator-mode #universe-bg {
            display: flex; flex-direction: column-reverse; align-items: center;
            padding: 90px 20px 110px; gap: 10px;
            overflow-y: auto; top: 0; left: 0; width: 100%; height: 100vh;
            perspective: none; filter: blur(0) brightness(1);
        }
        body.elevator-mode .history-node { position: relative; left:0!important; top:0!important; transform:none!important; width:100%; max-width:440px; }
        body.elevator-mode .history-node:hover { transform: translateX(6px)!important; box-shadow: none; }
        body.elevator-mode .node-floor { display: block; }
        body.elevator-mode #connections-canvas { opacity: 0; }
        body.elevator-mode #main-frame { display: none; }

        /* MOBILE */
        @media (max-width: 520px) {
            #topbar { padding: 14px 16px; }
            .logo span { display: none; }
            .frame-topbar { padding: 14px 16px 0; }
            .tab-bar { padding: 12px 16px 0; }
            .tab { padding: 7px 11px; font-size: 10px; }
            .tab-panel { padding: 12px 16px 0; }
            .action-row { padding: 12px 16px 16px; }
            .result-box { margin: 0 16px 12px; }
            .recent-strip { padding: 10px 16px 14px; }
        }
    </style>
</head>
<body>

    <div class="glow-blob glow-blob-1"></div>
    <div class="glow-blob glow-blob-2"></div>

    <div id="topbar">
        <div class="logo">
            <div class="logo-dot"></div>
            <span>x8 workspace</span>
        </div>
        <div class="topbar-right">
            <span class="count-badge" id="count-badge">0 nodes</span>
            <div class="icon-btn" id="elevator-btn" title="Elevator Mode" onclick="toggleLayout()">
                <i class="ph ph-stack"></i>
            </div>
            <div class="icon-btn" id="bg-btn" title="Focus Universe" onclick="toggleBgFocus()">
                <i class="ph ph-planet"></i>
            </div>
        </div>
    </div>

    <canvas id="connections-canvas"></canvas>
    <div id="universe-bg" onmouseleave="bgMouseLeave()"></div>

    <div id="main-frame" onclick="unlockAndFocus(event)">
        <div class="frame-inner">

            <div class="frame-topbar">
                <span class="frame-brand">x8 workspace</span>
                <div style="display:flex;align-items:center;gap:10px">
                    <span class="frame-clock" id="frame-clock">00:00:00</span>
                    <div class="frame-indicators">
                        <div class="fi fi-red"></div>
                        <div class="fi fi-yellow"></div>
                        <div class="fi fi-green"></div>
                    </div>
                </div>
            </div>

            <div class="tab-bar">
                <div class="tab active" data-tab="link" onclick="switchTab('link')">
                    <i class="ph ph-link-simple"></i> Link
                </div>
                <div class="tab blue-tab" data-tab="text" onclick="switchTab('text')">
                    <i class="ph ph-article"></i> Text
                </div>
                <div class="tab green-tab" data-tab="fetch" onclick="switchTab('fetch')">
                    <i class="ph ph-cloud-arrow-down"></i> Fetch
                </div>
            </div>

            <!-- LINK TAB -->
            <div class="tab-panel active" id="panel-link">
                <div class="field">
                    <i class="ph ph-globe field-icon"></i>
                    <input type="text" id="link-url" placeholder="https://example.com/very-long-url" oninput="validateUrl(this.value)" />
                </div>
                <div class="url-status" id="url-status"></div>
                <div class="adv-toggle" id="adv-toggle" onclick="toggleAdv()">
                    <i class="ph ph-caret-right"></i>
                    <span>Custom slug</span>
                </div>
                <div class="adv-panel" id="adv-panel">
                    <div class="slug-row">
                        <span class="slug-prefix" id="slug-prefix-text">x8stuff.lol/i/</span>
                        <div class="field">
                            <i class="ph ph-hash field-icon"></i>
                            <input type="text" id="link-slug" placeholder="my-slug" />
                        </div>
                    </div>
                </div>
            </div>

            <!-- TEXT TAB -->
            <div class="tab-panel" id="panel-text">
                <div class="field blue-field">
                    <i class="ph ph-pencil-line field-icon" style="bottom:auto;top:14px"></i>
                    <div class="textarea-wrap">
                        <textarea id="text-content" rows="4" placeholder="Type or paste anything to sync across devices..." oninput="updateCharCount(this)"></textarea>
                        <span class="char-count" id="char-count">0</span>
                    </div>
                </div>
            </div>

            <!-- FETCH TAB -->
            <div class="tab-panel" id="panel-fetch">
                <div class="field green-field">
                    <i class="ph ph-magnifying-glass field-icon"></i>
                    <input type="text" id="fetch-id" placeholder="Enter slug or ID to retrieve..." />
                </div>
                <div id="fetch-result-area">
                    <div class="fetch-empty">
                        <i class="ph ph-cloud-slash"></i>
                        <span>enter an ID to fetch content</span>
                    </div>
                </div>
            </div>

            <!-- RESULT BOX -->
            <div class="result-box" id="result-box">
                <div class="result-label" id="result-label">SHORTENED URL</div>
                <div class="result-content" id="result-content"></div>
                <div class="result-actions">
                    <button class="result-btn accent-btn" onclick="copyResult()">
                        <i class="ph ph-copy"></i> Copy
                    </button>
                    <button class="result-btn" id="qr-btn" onclick="showQR()">
                        <i class="ph ph-qr-code"></i> QR
                    </button>
                    <button class="result-btn" id="open-btn" onclick="openResult()">
                        <i class="ph ph-arrow-square-out"></i> Open
                    </button>
                </div>
            </div>

            <!-- ACTION ROW -->
            <div class="action-row">
                <button class="btn btn-primary" id="main-btn" onclick="handleMain(event)">
                    <i class="ph ph-link-simple" id="main-btn-icon"></i>
                    <span id="main-btn-text">Shorten</span>
                </button>
                <button class="btn btn-ghost btn-icon" title="Clear" onclick="clearAll(event)">
                    <i class="ph ph-eraser"></i>
                </button>
            </div>

            <div class="divider"></div>

            <!-- RECENT STRIP -->
            <div class="recent-strip">
                <div class="recent-header">
                    <span class="recent-title">
                        <i class="ph ph-clock-clockwise"></i> Recent
                    </span>
                    <span class="recent-count" id="recent-count">0</span>
                </div>
                <div class="recent-list" id="recent-list">
                    <div class="fetch-empty" style="padding:10px 0">
                        <i class="ph ph-tray"></i>
                        <span>no items yet</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- QR MODAL -->
    <div id="qr-modal" onclick="closeQR()">
        <div class="qr-box" onclick="event.stopPropagation()">
            <img id="qr-img" src="" width="200" height="200" alt="QR" />
            <div class="qr-label" id="qr-label"></div>
            <div class="qr-close" onclick="closeQR()">[ ESC TO CLOSE ]</div>
        </div>
    </div>

    <div id="toast">
        <i class="ph ph-check-circle toast-icon"></i>
        <span class="toast-text"></span>
        <span class="toast-value"></span>
    </div>

    <script>
        const SUPABASE_URL = "https://ikiuqdudpemfkfxzyyfw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_hbSVU_6CWa_9z2Aiex-fjA_8qxF9Eio";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const DOMAIN = window.location.origin;

        let historyData = [], nodes = [];
        let isElevator = false, bgFocused = false, bgLocked = false;
        let activeTab = 'link', lastResultUrl = '', toastTimer = null;

        // ─ TABS ─
        const TAB_CFG = {
            link:  { btnClass: 'btn-primary', icon: 'ph-link-simple', text: 'Shorten' },
            text:  { btnClass: 'btn-blue',    icon: 'ph-cloud-arrow-up', text: 'Push' },
            fetch: { btnClass: 'btn-green',   icon: 'ph-cloud-arrow-down', text: 'Fetch' }
        };
        function switchTab(tab) {
            activeTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${tab}`));
            const cfg = TAB_CFG[tab];
            const btn = document.getElementById('main-btn');
            btn.className = `btn ${cfg.btnClass}`;
            document.getElementById('main-btn-icon').className = `ph ${cfg.icon}`;
            document.getElementById('main-btn-text').textContent = cfg.text;
            document.getElementById('result-box').classList.remove('visible');
            document.getElementById('fetch-result-area').innerHTML =
                `<div class="fetch-empty"><i class="ph ph-cloud-slash"></i><span>enter an ID to fetch content</span></div>`;
        }

        // ─ ADV TOGGLE ─
        function toggleAdv() {
            document.getElementById('adv-toggle').classList.toggle('open');
            document.getElementById('adv-panel').classList.toggle('open');
        }

        // ─ URL VALIDATE ─
        function validateUrl(val) {
            const el = document.getElementById('url-status');
            if (!val) { el.innerHTML = ''; el.className = 'url-status'; return; }
            const ok = /^https?:\/\/.+\..+/.test(val);
            el.className = 'url-status ' + (ok ? 'valid' : 'invalid');
            el.innerHTML = ok
                ? `<i class="ph ph-check-circle"></i> valid url`
                : `<i class="ph ph-warning-circle"></i> not a valid url`;
        }

        // ─ CHAR COUNT ─
        function updateCharCount(el) {
            const n = el.value.length;
            const cc = document.getElementById('char-count');
            cc.textContent = n > 999 ? `${(n/1000).toFixed(1)}k` : n;
            cc.className = 'char-count' + (n > 4000 ? ' over' : n > 2000 ? ' warn' : '');
        }

        // ─ MAIN ACTION ─
        async function handleMain(e) {
            e.stopPropagation();
            if (activeTab === 'link') await doShorten();
            else if (activeTab === 'text') await doPush();
            else await doFetch();
        }

        function setLoading(on) {
            const btn = document.getElementById('main-btn');
            btn.disabled = on;
            if (on) btn.innerHTML = `<i class="ph ph-circle-notch" style="animation:spin 0.7s linear infinite"></i> Loading...`;
            else {
                const cfg = TAB_CFG[activeTab];
                btn.innerHTML = `<i class="ph ${cfg.icon}"></i> ${cfg.text}`;
            }
        }

        // ─ SHORTEN ─
        async function doShorten() {
            const url = document.getElementById('link-url').value.trim();
            const customSlug = document.getElementById('link-slug').value.trim();
            if (!url) return;
            setLoading(true);
            let slug = customSlug;
            if (!slug) {
                const { data: last } = await _supabase.from('workspace').select('id').order('id', { ascending: false }).limit(1).single();
                slug = last ? (last.id + 1).toString() : "1";
            }
            const { error } = await _supabase.from('workspace').insert([{ type: 'link', content: url, slug }]);
            setLoading(false);
            if (!error) {
                const short = `${DOMAIN}/i/${slug}`;
                lastResultUrl = short;
                showResult('SHORTENED URL', short, true);
                document.getElementById('link-url').value = '';
                document.getElementById('link-slug').value = '';
                validateUrl('');
                showToast('ph-check-circle', 'shortened →', short, 'success', short);
            } else showToast('ph-warning-circle', 'error:', error.message, 'error');
        }

        // ─ PUSH ─
        async function doPush() {
            const content = document.getElementById('text-content').value.trim();
            if (!content) return;
            setLoading(true);
            const { error } = await _supabase.from('workspace').insert([{ type: 'text', content }]);
            setLoading(false);
            if (!error) {
                document.getElementById('text-content').value = '';
                updateCharCount(document.getElementById('text-content'));
                showToast('ph-cloud-check', 'synced to', 'universe', 'push');
            } else showToast('ph-warning-circle', 'error:', error.message, 'error');
        }

        // ─ FETCH ─
        async function doFetch() {
            const id = document.getElementById('fetch-id').value.trim();
            if (!id) return;
            setLoading(true);
            const { data, error } = await _supabase.from('workspace')
                .select('*').or(`slug.eq.${id},id.eq.${parseInt(id)||0}`).limit(1).single();
            setLoading(false);
            const area = document.getElementById('fetch-result-area');
            if (!error && data) {
                const isLink = data.type === 'link';
                lastResultUrl = isLink ? `${DOMAIN}/i/${data.slug}` : data.content;
                area.innerHTML = '';
                showResult(isLink ? `LINK — /i/${data.slug}` : 'TEXT CONTENT', data.content, isLink);
                showToast('ph-check-circle', 'found:', id, 'copy');
            } else {
                area.innerHTML = `<div class="fetch-empty"><i class="ph ph-warning-circle"></i><span>nothing found for "${id}"</span></div>`;
                document.getElementById('result-box').classList.remove('visible');
            }
        }

        // ─ RESULT ─
        function showResult(label, content, showExtra = false) {
            document.getElementById('result-label').textContent = label;
            document.getElementById('result-content').textContent = content;
            document.getElementById('qr-btn').style.display = showExtra ? 'flex' : 'none';
            document.getElementById('open-btn').style.display = showExtra ? 'flex' : 'none';
            document.getElementById('result-box').classList.add('visible');
        }
        function copyResult() {
            navigator.clipboard.writeText(document.getElementById('result-content').textContent).catch(()=>{});
            showToast('ph-copy', 'copied to', 'clipboard', 'copy');
        }
        function openResult() { window.open(lastResultUrl, '_blank'); }

        // ─ QR ─
        function showQR() {
            document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(lastResultUrl)}&color=f0c060&bgcolor=07070a&margin=20`;
            document.getElementById('qr-label').textContent = lastResultUrl;
            document.getElementById('qr-modal').classList.add('show');
        }
        function closeQR() { document.getElementById('qr-modal').classList.remove('show'); }

        // ─ CLEAR ─
        function clearAll(e) {
            e.stopPropagation();
            ['link-url','link-slug','text-content','fetch-id'].forEach(id => {
                const el = document.getElementById(id); if (el) el.value = '';
            });
            document.getElementById('result-box').classList.remove('visible');
            document.getElementById('fetch-result-area').innerHTML =
                `<div class="fetch-empty"><i class="ph ph-cloud-slash"></i><span>enter an ID to fetch content</span></div>`;
            validateUrl('');
            updateCharCount(document.getElementById('text-content'));
        }

        // ─ TOAST ─
        function showToast(icon, text, value, type='success', copyText=null) {
            const t = document.getElementById('toast');
            t.querySelector('.toast-icon').className = `ph ${icon} toast-icon`;
            t.querySelector('.toast-text').textContent = text + ' ';
            const v = t.querySelector('.toast-value');
            const display = value.length > 38 ? value.substring(0,35)+'…' : value;
            v.textContent = display;
            v.onclick = copyText ? () => { navigator.clipboard.writeText(copyText).catch(()=>{}); v.textContent='copied!'; setTimeout(()=>v.textContent=display,1400); } : null;
            t.className = `toast-${type} show`;
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
        }

        // ─ INIT ─
        async function initUniverse() {
            const { data, error } = await _supabase.from('workspace').select('*').order('created_at', { ascending: true });
            if (!error) { historyData = data; renderNodes(); renderRecent(); updateBadge(); }
        }
        function updateBadge() {
            document.getElementById('count-badge').textContent = `${historyData.length} node${historyData.length!==1?'s':''}`;
        }

        // ─ TIME ─
        function timeAgo(dateStr) {
            if (!dateStr) return '';
            const diff = Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000);
            if (diff < 5)  return 'just now';
            if (diff < 60) return diff + 's ago';
            if (diff < 3600) return Math.floor(diff/60) + 'm ago';
            if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
            if (diff < 604800) return Math.floor(diff/86400) + 'd ago';
            return new Date(dateStr).toLocaleDateString();
        }

        function tickClock() {
            const now = new Date();
            const pad = n => String(n).padStart(2,'0');
            const el = document.getElementById('frame-clock');
            if (el) el.textContent = pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
        }
        tickClock();
        setInterval(tickClock, 1000);
        setInterval(renderRecent, 30000);

        // ─ RECENT ─
        function renderRecent() {
            const list = document.getElementById('recent-list');
            document.getElementById('recent-count').textContent = historyData.length;
            const items = [...historyData].reverse().slice(0, 5);
            if (!items.length) {
                list.innerHTML = `<div class="fetch-empty" style="padding:10px 0"><i class="ph ph-tray"></i><span>no items yet</span></div>`;
                return;
            }
            list.innerHTML = items.map(item => {
                const isLink = item.type === 'link';
                const display = isLink ? `${DOMAIN}/i/${item.slug}` : item.content;
                const copyVal = encodeURIComponent(display);
                const ts = timeAgo(item.created_at);
                return `<div class="recent-item" onclick="copyRecent('${copyVal}')">
                    <span class="recent-badge ${isLink?'badge-link':'badge-text'}">${item.type.toUpperCase()}</span>
                    <span class="recent-val">${escapeHtml(display)}</span>
                    <span class="recent-time">${ts}</span>
                    <i class="ph ph-copy recent-copy"></i>
                </div>`;
            }).join('');
        }
        function copyRecent(enc) {
            const val = decodeURIComponent(enc);
            navigator.clipboard.writeText(val).catch(()=>{});
            showToast('ph-copy', 'copied:', val.length>30?val.substring(0,28)+'…':val, 'copy');
        }

        // ─ NODES ─
        function renderNodes() {
            const container = document.getElementById('universe-bg');
            container.innerHTML = ''; nodes = [];
            historyData.forEach((item, i) => {
                const el = document.createElement('div');
                el.className = 'history-node';
                const isLink = item.type === 'link';
                const ts = timeAgo(item.created_at);
                el.innerHTML = `
                    <div class="node-floor">F${i+1}</div>
                    <div class="node-type ${item.type}"><i class="ph ${isLink?'ph-link-simple':'ph-article'}"></i>${item.type.toUpperCase()}</div>
                    <div class="node-content">${escapeHtml(item.content)}</div>
                    <div class="node-time"><i class="ph ph-clock"></i>${ts}</div>`;
                el.addEventListener('click', e => {
                    e.stopPropagation();
                    const v = isLink ? `${DOMAIN}/i/${item.slug}` : item.content;
                    navigator.clipboard.writeText(v).catch(()=>{});
                    showToast('ph-copy', 'copied:', isLink?`/i/${item.slug}`:item.content.substring(0,22)+'…', 'copy');
                });
                const x=Math.random()*78+8, y=Math.random()*78+8, z=(Math.random()-0.5)*700;
                el.style.left=`${x}%`; el.style.top=`${y}%`; el.style.transform=`translateZ(${z}px)`;
                container.appendChild(el);
                nodes.push({el,x,y,z});
            });
            renderCanvas(); updateBadge();
        }

        function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        _supabase.channel('changes').on('postgres_changes', {
            event:'INSERT', schema:'public', table:'workspace'
        }, p => { historyData.push(p.new); renderNodes(); renderRecent(); }).subscribe();

        // ─ CANVAS ─
        const canvas = document.getElementById('connections-canvas');
        const ctx = canvas.getContext('2d');
        function renderCanvas() {
            canvas.width=window.innerWidth*1.4; canvas.height=window.innerHeight*1.4;
            if (isElevator || nodes.length < 2) return;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            nodes.forEach((n1,i) => nodes.slice(i+1).forEach(n2 => {
                if (Math.hypot(n1.x-n2.x,n1.y-n2.y)>38||Math.random()>0.4) return;
                const r1=n1.el.getBoundingClientRect(), r2=n2.el.getBoundingClientRect();
                const ox=canvas.width*0.14, oy=canvas.height*0.14;
                const g=ctx.createLinearGradient(r1.left+r1.width/2+ox,r1.top+r1.height/2+oy,r2.left+r2.width/2+ox,r2.top+r2.height/2+oy);
                g.addColorStop(0,'rgba(240,192,96,0.07)'); g.addColorStop(1,'rgba(255,255,255,0.02)');
                ctx.strokeStyle=g; ctx.lineWidth=0.7;
                ctx.beginPath(); ctx.moveTo(r1.left+r1.width/2+ox,r1.top+r1.height/2+oy);
                ctx.lineTo(r2.left+r2.width/2+ox,r2.top+r2.height/2+oy); ctx.stroke();
            }));
        }

        // ─ PARALLAX ─
        document.addEventListener('mousemove', e => {
            if (isElevator) return;
            const x=(e.clientX/window.innerWidth-0.5)*28, y=(e.clientY/window.innerHeight-0.5)*28;
            document.getElementById('universe-bg').style.transform=`rotateY(${x/10}deg) rotateX(${-y/10}deg) translate(${x*0.55}px,${y*0.55}px)`;
        });

        // ─ BG FOCUS ─
        function toggleBgFocus() {
            bgFocused=!bgFocused; bgLocked=bgFocused;
            document.body.classList.toggle('bg-focused',bgFocused);
            document.getElementById('bg-btn').classList.toggle('active',bgFocused);
        }
        function bgMouseLeave() { if (!bgLocked) document.body.classList.remove('bg-focused'); }
        function unlockAndFocus(e) {
            bgFocused=false; bgLocked=false;
            document.body.classList.remove('bg-focused');
            document.getElementById('bg-btn').classList.remove('active');
            e.stopPropagation();
        }

        // ─ ELEVATOR ─
        function toggleLayout() {
            isElevator=!isElevator;
            document.body.classList.toggle('elevator-mode',isElevator);
            const btn=document.getElementById('elevator-btn');
            btn.classList.toggle('active',isElevator);
            btn.querySelector('i').className=isElevator?'ph ph-planet':'ph ph-stack';
            if (isElevator) { bgFocused=true; bgLocked=true; document.body.classList.add('bg-focused'); }
            else { bgFocused=false; bgLocked=false; document.body.classList.remove('bg-focused'); setTimeout(renderCanvas,300); }
        }

        // ─ KEYBOARD ─
        document.addEventListener('keydown', e => {
            if (e.key==='Escape') {
                if (document.getElementById('qr-modal').classList.contains('show')) { closeQR(); return; }
                if (isElevator) { toggleLayout(); return; }
                if (bgFocused) { bgFocused=false; bgLocked=false; document.body.classList.remove('bg-focused'); }
            }
        });

        const s=document.createElement('style');
        s.textContent='@keyframes spin{to{transform:rotate(360deg)}}';
        document.head.appendChild(s);

        document.getElementById('slug-prefix-text').textContent=`${window.location.host}/i/`;
        window.addEventListener('resize', renderCanvas);
        initUniverse();
    </script>
</body>
</html>

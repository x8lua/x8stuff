<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>x8stuff | Universe Workspace</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --glass-bg: rgba(10, 10, 10, 0.8);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            perspective: 1200px;
            width: 100vw;
            height: 100vh;
        }

        /* 畫布與背景 */
        #connections-canvas {
            position: absolute;
            top: -20%; left: -20%;
            width: 140%; height: 140%;
            z-index: 1;
            pointer-events: none;
            transition: filter 0.5s ease;
        }

        #universe-bg {
            position: absolute;
            top: -10%; left: -10%;
            width: 120%; height: 120%;
            z-index: 5;
            transition: filter 0.5s ease, transform 0.1s ease-out;
            transform-style: preserve-3d;
            filter: blur(15px);
        }

        body.bg-focused #universe-bg, 
        body.bg-focused #connections-canvas { filter: blur(0px); }

        body.bg-focused #main-frame { 
            filter: blur(25px); 
            transform: translate(-50%, -50%) scale(0.92); 
            opacity: 0.35; 
            cursor: pointer;
        }

        /* 主控台 Frame */
        #main-frame {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(1);
            width: 520px;
            z-index: 100;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 24px;
            padding: 32px;
            backdrop-filter: blur(50px);
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.9);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            color: #fff;
            margin-bottom: 24px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            resize: none;
            transition: 0.3s;
        }
        
        .action-row { display: flex; gap: 14px; }

        button {
            flex: 1; padding: 16px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s;
        }

        .btn-shorten { background: #fff; color: #000; }
        .btn-shorten:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,255,255,0.15); }

        .btn-push { background: #1a1a1a; color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        .btn-push:hover { background: #222; border-color: rgba(255,255,255,0.3); }

        /* 歷史節點 */
        .history-node {
            position: absolute;
            background: rgba(20, 20, 20, 0.85);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 18px;
            width: 260px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .history-node:hover { border-color: #fff; transform: scale(1.1) translateZ(50px) !important; z-index: 1000; }
        
        .node-floor { display: none; position: absolute; left: -60px; font-size: 28px; font-weight: 800; color: rgba(255,255,255,0.15); }
        .node-type { font-size: 10px; color: #777; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; display: flex; align-items: center; gap: 5px;}
        .node-content { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #ccc; word-break: break-all; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;}

        /* 電梯模式 */
        body.elevator-mode #universe-bg {
            display: flex; flex-direction: column-reverse; align-items: center;
            padding: 150px 0; gap: 40px; top: 0; left: 0; width: 100%; height: 100vh;
            overflow-y: auto; perspective: none; filter: blur(0);
        }
        body.elevator-mode .history-node { position: relative; left: 0 !important; top: 0 !important; transform: none !important; width: 450px; }
        body.elevator-mode .node-floor { display: block; }

        .layout-toggle {
            position: absolute; top: 30px; right: 30px; z-index: 200;
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            color: #fff; padding: 12px 20px; border-radius: 12px; font-weight: 600;
            cursor: pointer; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body id="main-body">

    <button class="layout-toggle" onclick="toggleLayout()">
        <i class="ph ph-elevator"></i> <span id="mode-text">Elevator Mode</span>
    </button>

    <canvas id="connections-canvas"></canvas>

    <div id="universe-bg" onmouseenter="focusBg()" onmouseleave="unfocusBg()" onclick="focusBg(true)"></div>

    <div id="main-frame" onmouseenter="unfocusBg()" onclick="unlockAndFocus(event)">
        <textarea id="main-input" rows="3" placeholder="Paste URL to shorten, or text to sync..."></textarea>
        <div class="action-row">
            <button id="shorten-btn" class="btn-shorten" onclick="handleShorten(event)">
                <i class="ph ph-link"></i> Shorten
            </button>
            <button id="push-btn" class="btn-push" onclick="handlePush(event)">
                <i class="ph ph-cloud-arrow-up"></i> Push
            </button>
        </div>
    </div>

    <script>
        // --- ⚙️ 配置區 ---
        const SUPABASE_URL = "https://ikiuqdudpemfkfxzyyfw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_hbSVU_6CWa_9z2Aiex-fjA_8qxF9Eio";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 自動獲取當前網域 (例如 x8stuff.vercel.app 或 x8stuff.lol)
        const CURRENT_DOMAIN = window.location.origin;

        let historyData = [];
        const nodes = [];
        let isElevator = false;
        let isLocked = false;

        // --- 🛠️ 核心邏輯 ---

        async function initUniverse() {
            const { data, error } = await _supabase
                .from('workspace')
                .select('*')
                .order('created_at', { ascending: true });

            if (!error) {
                historyData = data;
                renderNodes();
            }
        }

        function renderNodes() {
            const container = document.getElementById('universe-bg');
            container.innerHTML = '';
            nodes.length = 0;

            historyData.forEach((item, i) => {
                const el = document.createElement('div');
                el.className = 'history-node';
                const icon = item.type === 'link' ? 'ph-link' : 'ph-text-t';
                el.innerHTML = `
                    <div class="node-floor">F${i+1}</div>
                    <div class="node-type"><i class="ph ${icon}"></i> ${item.type}</div>
                    <div class="node-content">${item.content}</div>
                `;
                const x = Math.random() * 80 + 10;
                const y = Math.random() * 80 + 10;
                const z = (Math.random() - 0.5) * 600;
                el.style.left = `${x}%`; el.style.top = `${y}%`; el.style.transform = `translateZ(${z}px)`;
                container.appendChild(el);
                nodes.push({ el, x, y, z });
            });
            renderCanvas();
        }

        // 即時更新
        _supabase.channel('changes').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'workspace' }, payload => {
            historyData.push(payload.new);
            renderNodes();
        }).subscribe();

        // 縮網址 (自動網域)
        async function handleShorten(e) {
            e.stopPropagation();
            const input = document.getElementById('main-input');
            const btn = document.getElementById('shorten-btn');
            if(!input.value) return;

            btn.disabled = true;
            btn.innerHTML = `<i class="ph ph-circle-notch"></i>...`;

            const { data: lastItem } = await _supabase.from('workspace').select('id').order('id', { ascending: false }).limit(1).single();
            const nextSlug = lastItem ? (lastItem.id + 1).toString() : "1";

            const { error } = await _supabase.from('workspace').insert([{ type: 'link', content: input.value, slug: nextSlug }]);

            if (!error) {
                // 這裡會自動使用當前網域
                alert(`SUCCESS: ${CURRENT_DOMAIN}/i/${nextSlug}`);
                input.value = '';
            }
            btn.disabled = false;
            btn.innerHTML = `<i class="ph ph-link"></i> Shorten`;
        }

        async function handlePush(e) {
            e.stopPropagation();
            const input = document.getElementById('main-input');
            if(!input.value) return;
            const { error } = await _supabase.from('workspace').insert([{ type: 'text', content: input.value }]);
            if (!error) input.value = '';
        }

        // --- 視覺特效 ---
        const canvas = document.getElementById('connections-canvas');
        const ctx = canvas.getContext('2d');
        function renderCanvas() {
            canvas.width = window.innerWidth * 1.4; canvas.height = window.innerHeight * 1.4;
            if(isElevator) return;
            ctx.clearRect(0,0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(255,255,255,0.06)';
            nodes.forEach((n1, i) => {
                nodes.slice(i+1).forEach(n2 => {
                    if(Math.random() > 0.3) return;
                    const r1 = n1.el.getBoundingClientRect(); const r2 = n2.el.getBoundingClientRect();
                    ctx.beginPath();
                    ctx.moveTo(r1.left + r1.width/2 + canvas.width*0.14, r1.top + r1.height/2 + canvas.height*0.14);
                    ctx.lineTo(r2.left + r2.width/2 + canvas.width*0.14, r2.top + r2.height/2 + canvas.height*0.14);
                    ctx.stroke();
                });
            });
        }

        window.addEventListener('mousemove', e => {
            if(isElevator) return;
            const x = (e.clientX / window.innerWidth - 0.5) * 40;
            const y = (e.clientY / window.innerHeight - 0.5) * 40;
            document.getElementById('universe-bg').style.transform = `rotateY(${x/10}deg) rotateX(${-y/10}deg) translate(${x}px, ${y}px)`;
        });

        function focusBg(lock = false) { if(lock) isLocked = true; document.body.classList.add('bg-focused'); }
        function unfocusBg() { if(isLocked) return; document.body.classList.remove('bg-focused'); }
        function unlockAndFocus(e) { isLocked = false; unfocusBg(); e.stopPropagation(); }

        function toggleLayout() {
            isElevator = !isElevator;
            document.body.classList.toggle('elevator-mode');
            document.getElementById('mode-text').innerText = isElevator ? "Universe Mode" : "Elevator Mode";
            if(isElevator) focusBg(true); else { isLocked = false; unfocusBg(); setTimeout(renderCanvas, 300); }
        }

        initUniverse();
    </script>
</body>
</html>

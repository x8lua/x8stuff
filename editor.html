<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>x8 HTML Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,wght@0,400;0,700;1,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --border: rgba(255,255,255,0.07);
    --text: #e8e8e8;
    --dim: rgba(255,255,255,0.3);
    --accent: #c8ff00;
    --accent-dim: rgba(200,255,0,0.12);
    --font-ui: 'Google Sans', sans-serif;
    --font-code: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 48px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }

  .logo {
    font-weight: 700;
    font-style: italic;
    font-size: 18px;
    letter-spacing: -0.5px;
    color: #fff;
  }

  .logo span {
    color: var(--accent);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn {
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 6px 16px;
    border-radius: 4px;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .btn-ghost {
    background: transparent;
    color: var(--dim);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover {
    color: var(--text);
    border-color: rgba(255,255,255,0.2);
  }

  .btn-execute {
    background: var(--accent);
    color: #000;
  }
  .btn-execute:hover {
    background: #d4ff1a;
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(200,255,0,0.3);
  }
  .btn-execute:active {
    transform: translateY(0);
  }

  /* ── MAIN LAYOUT ── */
  .workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── EDITOR PANEL ── */
  .editor-panel {
    width: 50%;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    height: 36px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .panel-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--dim);
  }

  .char-count {
    font-family: var(--font-code);
    font-size: 10px;
    color: rgba(255,255,255,0.2);
  }

  .editor-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  textarea {
    width: 100%;
    height: 100%;
    background: transparent;
    color: #a8d8a0;
    font-family: var(--font-code);
    font-size: 12.5px;
    line-height: 1.7;
    padding: 16px 20px;
    border: none;
    outline: none;
    resize: none;
    caret-color: var(--accent);
    letter-spacing: 0.2px;
  }

  textarea::placeholder {
    color: rgba(255,255,255,0.12);
    font-style: italic;
  }

  textarea::-webkit-scrollbar { width: 4px; }
  textarea::-webkit-scrollbar-track { background: transparent; }
  textarea::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  /* ── PREVIEW PANEL ── */
  .preview-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .preview-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 16px;
    height: 36px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .preview-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
  }
  .preview-dot.active {
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
  }

  .preview-url {
    font-family: var(--font-code);
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    flex: 1;
  }

  iframe {
    flex: 1;
    border: none;
    background: #fff;
    width: 100%;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: rgba(255,255,255,0.1);
    pointer-events: none;
  }

  .empty-icon {
    font-size: 48px;
    opacity: 0.4;
  }

  .empty-text {
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 700;
  }

  .empty-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.07);
    letter-spacing: 0.5px;
  }

  /* ── FULLSCREEN OVERLAY ── */
  #fullscreenOverlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: #000;
  }

  #fullscreenOverlay iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  #exitBtn {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 1001;
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 6px 14px;
    background: rgba(0,0,0,0.7);
    color: rgba(255,255,255,0.5);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    backdrop-filter: blur(8px);
  }
  #exitBtn:hover {
    color: #fff;
    border-color: rgba(255,255,255,0.4);
  }

  /* status flash */
  .status-flash {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .status-flash.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo">x8<span>.</span>preview</div>
  <div class="header-right">
    <span class="status-flash" id="statusFlash">Executed</span>
    <button class="btn btn-ghost" id="clearBtn">Clear</button>
    <button class="btn btn-ghost" id="previewBtn">Preview</button>
    <button class="btn btn-execute" id="executeBtn">▶ Execute</button>
  </div>
</header>

<div class="workspace">
  <!-- EDITOR -->
  <div class="editor-panel">
    <div class="panel-header">
      <span class="panel-label">Code</span>
      <span class="char-count" id="charCount">0 chars</span>
    </div>
    <div class="editor-wrap">
      <textarea id="codeInput" placeholder="Paste your HTML here...
&#10;Then click Execute to run it fullscreen.&#10;&#10;Or click Preview to see it in the panel →"></textarea>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="preview-panel">
    <div class="preview-bar">
      <div class="preview-dot" id="previewDot"></div>
      <span class="preview-url" id="previewUrl">— no preview —</span>
      <span class="panel-label">Preview</span>
    </div>
    <div id="emptyState" class="empty-state">
      <div class="empty-icon">◻</div>
      <div class="empty-text">No preview</div>
      <div class="empty-sub">Click Preview or Execute</div>
    </div>
    <iframe id="previewFrame" style="display:none;"></iframe>
  </div>
</div>

<!-- FULLSCREEN -->
<div id="fullscreenOverlay">
  <iframe id="fullscreenFrame"></iframe>
  <button id="exitBtn">✕ Exit</button>
</div>

<script>
  const codeInput      = document.getElementById('codeInput');
  const executeBtn     = document.getElementById('executeBtn');
  const previewBtn     = document.getElementById('previewBtn');
  const clearBtn       = document.getElementById('clearBtn');
  const charCount      = document.getElementById('charCount');
  const statusFlash    = document.getElementById('statusFlash');
  const fullscreenOverlay = document.getElementById('fullscreenOverlay');
  const fullscreenFrame   = document.getElementById('fullscreenFrame');
  const exitBtn        = document.getElementById('exitBtn');
  const previewFrame   = document.getElementById('previewFrame');
  const emptyState     = document.getElementById('emptyState');
  const previewDot     = document.getElementById('previewDot');
  const previewUrl     = document.getElementById('previewUrl');

  // char count
  codeInput.addEventListener('input', () => {
    const n = codeInput.value.length;
    charCount.textContent = n.toLocaleString() + ' chars';
  });

  // flash helper
  let flashTimer;
  function flash(msg) {
    statusFlash.textContent = msg;
    statusFlash.classList.add('show');
    clearTimeout(flashTimer);
    flashTimer = setTimeout(() => statusFlash.classList.remove('show'), 1800);
  }

  function getCode() {
    return codeInput.value.trim();
  }

  // PREVIEW — show in side panel
  previewBtn.addEventListener('click', () => {
    const code = getCode();
    if (!code) return;
    emptyState.style.display = 'none';
    previewFrame.style.display = 'block';
    previewFrame.srcdoc = code;
    previewDot.classList.add('active');
    previewUrl.textContent = 'blob:preview';
    flash('Previewing');
  });

  // EXECUTE — fullscreen
  executeBtn.addEventListener('click', () => {
    const code = getCode();
    if (!code) return;
    fullscreenFrame.srcdoc = code;
    fullscreenOverlay.style.display = 'block';
    flash('Executed');
  });

  // EXIT fullscreen
  exitBtn.addEventListener('click', () => {
    fullscreenOverlay.style.display = 'none';
    fullscreenFrame.srcdoc = '';
  });

  // ESC key exits
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && fullscreenOverlay.style.display === 'block') {
      fullscreenOverlay.style.display = 'none';
      fullscreenFrame.srcdoc = '';
    }
  });

  // CLEAR
  clearBtn.addEventListener('click', () => {
    codeInput.value = '';
    charCount.textContent = '0 chars';
    previewFrame.style.display = 'none';
    previewFrame.srcdoc = '';
    emptyState.style.display = 'flex';
    previewDot.classList.remove('active');
    previewUrl.textContent = '— no preview —';
    flash('Cleared');
  });

  // Ctrl+Enter = Execute
  codeInput.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      executeBtn.click();
    }
  });
</script>
</body>
</html>

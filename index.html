<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>x8</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,wght@1,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0c0c0c;
    }

    /* background photo — pure atmosphere */
    .bg {
      position: fixed; inset: 0;
      z-index: 0;
    }
    .bg img {
      width: 100%; height: 100%;
      object-fit: cover;
      filter: grayscale(1) brightness(0.08);
    }

    /* center everything */
    .stage {
      position: fixed; inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* the logotype */
    .logo {
      font-family: 'Google Sans', sans-serif;
      font-weight: 700;
      font-style: italic;
      font-size: clamp(7rem, 20vw, 16rem);
      color: #f0ede8;
      letter-spacing: -0.03em;
      line-height: 1;
      user-select: none;
      opacity: 0;
      animation: appear 0.8s ease 0.1s forwards;
    }

    /* volume — bottom right, invisible until hovered */
    .vol {
      position: fixed;
      bottom: 32px; right: 36px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0.18;
      transition: opacity 0.3s;
    }
    .vol:hover { opacity: 1; }
    .vol-label {
      font-family: 'Google Sans', sans-serif;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      color: #f0ede8;
      text-transform: uppercase;
    }
    .vol-bar {
      position: relative;
      width: 72px; height: 1px;
      background: rgba(240,237,232,0.2);
    }
    .vol-fill {
      position: absolute;
      left: 0; top: 0;
      height: 100%;
      width: 50%;
      background: #f0ede8;
      transition: width 0.05s;
    }
    input[type=range].vol-input {
      position: absolute;
      inset: -8px 0;
      width: 100%;
      opacity: 0;
      cursor: pointer;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="bg"><img src="/pics/lobby.jpg" alt=""></div>

  <div class="stage">
    <div class="logo">x8</div>
  </div>

  <div class="vol">
    <span class="vol-label">vol</span>
    <div class="vol-bar">
      <div class="vol-fill" id="vf"></div>
      <input type="range" class="vol-input" id="vol" min="0" max="1" step="0.01" value="0.5">
    </div>
  </div>

  <audio id="audio" src="/lobby.mp3" autoplay loop></audio>

  <script>
    const audio = document.getElementById('audio');
    const slider = document.getElementById('vol');
    const fill = document.getElementById('vf');
    audio.volume = 0.5;
    document.body.addEventListener('click', () => audio.play().catch(() => {}), { once: true });
    slider.addEventListener('input', e => {
      const v = +e.target.value;
      audio.volume = v;
      fill.style.width = (v * 100) + '%';
    });
  </script>
</body>
</html>

port: 7890
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

proxies:
  - name: "日本Hy2 | 3Gbps"
    type: hysteria2
    server: 23.176.40.8
    port: 443
    password: Nihon3Gbps
    sni: bing.com  # 因為我們剛才生成的證書用的是 bing.com 做域名偽裝
    skip-cert-verify: true

proxy-groups:
  - name: 🚀 Nihon
    type: select
    proxies:
      - "日本Hy2 | 3Gbps"
      - DIRECT

rules:
  # 局域網與本地直連
  - DOMAIN-SUFFIX,local,DIRECT
  - DOMAIN-SUFFIX,localhost,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve

  # 中國大陸地區網站與 IP 直連
  - DOMAIN-SUFFIX,cn,DIRECT
  - GEOIP,CN,DIRECT

  # 剩餘的所有國外流量，通通交給 Nihon 暴力超頻
  - MATCH,🚀 Nihon

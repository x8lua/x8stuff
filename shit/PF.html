<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL - X8 ALT CONTROL</title>
    <style>
        body { background-color: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { border: 1px solid #00ff41; padding: 30px; background: rgba(0, 0, 0, 0.9); width: 80%; max-width: 500px; text-align: center; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .btn { background: transparent; border: 1px solid #00ff41; color: #00ff41; padding: 15px; cursor: pointer; font-family: inherit; }
        .btn:hover { background: #00ff41; color: #000; }
        .btn-panic { grid-column: span 2; border-color: #ff0000; color: #ff0000; }
        #log { margin-top: 20px; font-size: 0.8rem; color: #008f11; text-align: left; height: 80px; overflow-y: auto; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>> X8_ALT_COMMANDER_V1.0</h1>
    <div id="status">SYSTEM_STATUS: <span id="current-cmd">WAITING...</span></div>
    
    <div class="btn-group">
        <button class="btn" onclick="send('IDLE')">[ IDLE ]</button>
        <button class="btn" onclick="send('RUNNING')">[ RUNNING ]</button>
        <button class="btn btn-panic" onclick="send('RETREAT')">!!! 撤退 !!!</button>
    </div>

    <div id="log"></div>
</div>

<script>
    // 1. 宣告變數 (確保網址正確，開頭只有一個 https://)
    const SB_URL = "https://eimkojcgfsjlbxxpiiuh.supabase.co/rest/v1/alt_control?id=eq.1";
    const SB_KEY = "sb_publishable_nRNFb0Vc796L82oggdgOLA_U-d78rPo";

    // 2. 定義 send 函數 (一定要在 HTML 呼叫它之前或同時加載)
    async function send(mode) {
        const log = document.getElementById('log');
        const status = document.getElementById('current-cmd');
        
        console.log("正在嘗試發送指令:", mode);
        log.innerHTML += `> 執行指令: ${mode}...<br>`;
        
        try {
            const response = await fetch(SB_URL, {
                method: 'PATCH',
                headers: {
                    'apikey': SB_KEY,
                    'Authorization': `Bearer ${SB_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify({ 
                    command: mode, 
                    updated_at: new Date().toISOString() 
                })
            });

            if (response.ok) {
                status.innerText = mode;
                log.innerHTML += `> 成功: 模式已切換為 ${mode}<br>`;
            } else {
                const errText = await response.text();
                log.innerHTML += `> 錯誤: ${response.status} ${errText}<br>`;
            }
        } catch (err) {
            log.innerHTML += `> 失敗: 連線至指揮部時發生致命錯誤<br>`;
            console.error(err);
        }
        log.scrollTop = log.scrollHeight;
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X8_ALT_COMMANDER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@700;800&display=swap');

        :root {
            --bg:         #05070d;
            --surface:    #0a0f1a;
            --surface2:   #0f1625;
            --border:     rgba(148,163,184,0.1);
            --border-h:   rgba(148,163,184,0.3);
            --blue:       #7eb8f7;
            --blue-dim:   rgba(126,184,247,0.5);
            --red:        #f87171;
            --orange:     #fb923c;
            --green:      #4ade80;
            --cyan:       #22d3ee;
            --text:       #94a3b8;
            --text-bright:#e2e8f0;
            --text-dim:   #334155;
        }

        * { box-sizing:border-box; margin:0; padding:0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            min-height: 100vh;
            display: grid;
            place-items: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content:'';
            position:fixed; inset:0;
            background-image:
                linear-gradient(rgba(126,184,247,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(126,184,247,0.025) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events:none; z-index:0;
        }

        .ambient { position:fixed; border-radius:50%; pointer-events:none; filter:blur(100px); z-index:0; }
        .a1 { width:500px;height:500px; background:rgba(126,184,247,0.04); top:-150px; right:-150px; }
        .a2 { width:400px;height:400px; background:rgba(74,222,128,0.025); bottom:-100px; left:-100px; }

        /* ══════════════ OVERLAY ══════════════ */
        #fs-overlay {
            position:fixed; inset:0;
            z-index:99999;
            display:none;
            overflow:hidden;
        }
        #fs-overlay.active { display:block; }

        #fs-canvas {
            position:absolute; inset:0;
            width:100%; height:100%;
        }

        /* scanlines always on top of canvas */
        #fs-scanlines {
            position:absolute; inset:0;
            background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.1) 3px,rgba(0,0,0,0.1) 4px);
            pointer-events:none; z-index:2;
        }

        /* text container centered */
        #fs-text {
            position:absolute; inset:0;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            z-index:3; pointer-events:none;
            gap:14px;
        }

        #fs-label {
            font-family:'Syne',sans-serif; font-weight:800;
            font-size:clamp(3rem,11vw,7.5rem);
            letter-spacing:0.06em; text-align:center; line-height:1;
        }
        #fs-sub {
            font-size:clamp(0.65rem,1.8vw,0.9rem);
            letter-spacing:0.28em; text-align:center;
            padding:0 20px; max-width:600px;
        }
        #fs-countdown {
            font-family:'Syne',sans-serif; font-weight:800;
            font-size:clamp(0.9rem,2.5vw,1.4rem);
            letter-spacing:0.3em; margin-top:8px;
        }

        /* ══════════════ CARD ══════════════ */
        .card {
            position:relative; z-index:10;
            width:min(94vw,460px);
            background:var(--surface);
            border:1px solid var(--border); border-radius:3px;
            box-shadow:0 0 0 1px rgba(255,255,255,0.02),0 40px 80px rgba(0,0,0,0.7);
            animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes fadeUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }

        .hdr { display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.01); }
        .hdr-left { display:flex;align-items:center;gap:10px; }
        .logo { width:28px;height:28px;border:1px solid rgba(126,184,247,0.3);display:grid;place-items:center; }
        .logo-inner { width:8px;height:8px;background:var(--blue);box-shadow:0 0 10px var(--blue);animation:lp 2s ease-in-out infinite; }
        @keyframes lp { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.3;transform:scale(0.5);} }
        .title { font-family:'Syne',sans-serif;font-weight:800;font-size:0.78rem;letter-spacing:0.2em;color:var(--text-bright); }
        .online-badge { display:flex;align-items:center;gap:6px;font-size:0.6rem;letter-spacing:0.12em;color:var(--text-dim);border:1px solid var(--border);padding:4px 10px; }
        .online-dot { width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:lp 1.6s infinite; }

        .body { padding:22px; }

        .mode-card { background:var(--surface2);border:1px solid var(--border);padding:16px 18px;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between;transition:border-color 0.3s,box-shadow 0.3s; }
        .mode-card.state-retreat { border-color:rgba(34,211,238,0.3);box-shadow:0 0 24px rgba(34,211,238,0.08); }
        .mode-card.state-attack  { border-color:rgba(248,113,113,0.4);box-shadow:0 0 24px rgba(248,113,113,0.1); }
        .mode-card.state-idle    { border-color:rgba(126,184,247,0.15);box-shadow:none; }

        .mode-meta { display:flex;flex-direction:column;gap:4px; }
        .mode-label { font-size:0.58rem;color:var(--text-dim);letter-spacing:0.18em; }
        .mode-value { font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:var(--blue);letter-spacing:0.08em;transition:color 0.3s; }
        .mode-value.state-retreat { color:var(--cyan);   text-shadow:0 0 16px rgba(34,211,238,0.5); }
        .mode-value.state-attack  { color:var(--red);    text-shadow:0 0 16px rgba(248,113,113,0.5); }
        .mode-value.state-idle    { color:var(--blue);   text-shadow:none; }

        .countdown { font-size:0.7rem;color:var(--text-dim);letter-spacing:0.05em;min-width:60px;text-align:right; }
        .countdown.active { color:var(--text); }

        .sec-lbl { display:flex;align-items:center;gap:10px;margin-bottom:10px; }
        .sec-lbl span { font-size:0.58rem;letter-spacing:0.18em;color:var(--text-dim);white-space:nowrap; }
        .sec-lbl::after { content:'';flex:1;height:1px;background:var(--border); }

        .ctrl-row { display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px; }

        .ctrl-btn { background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:14px 16px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:0.68rem;letter-spacing:0.06em;transition:all 0.18s;text-align:left; }
        .ctrl-btn:hover { border-color:var(--border-h);color:var(--text-bright);background:rgba(255,255,255,0.03); }
        .ctrl-btn:active { transform:scale(0.97); }
        .ctrl-btn .n { display:block;font-size:0.55rem;color:var(--text-dim);margin-bottom:5px;letter-spacing:0.15em; }
        .ctrl-btn .l { display:block;font-weight:700;color:var(--text-bright); }
        .ctrl-btn .s { display:block;font-size:0.6rem;color:var(--text-dim);margin-top:3px; }

        .retreat-btn { width:100%;background:rgba(34,211,238,0.04);border:1px solid rgba(34,211,238,0.18);color:var(--cyan);padding:15px 18px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:0.68rem;letter-spacing:0.14em;text-transform:uppercase;transition:all 0.18s;display:flex;align-items:center;gap:12px;margin-bottom:22px; }
        .retreat-btn::before { content:'';width:3px;align-self:stretch;background:var(--cyan);opacity:0.4;flex-shrink:0;transition:opacity 0.18s; }
        .retreat-btn:hover { background:rgba(34,211,238,0.08);border-color:rgba(34,211,238,0.4);box-shadow:0 0 24px rgba(34,211,238,0.1); }
        .retreat-btn:hover::before { opacity:1; }
        .retreat-btn:active { transform:scale(0.99); }

        .attack-btn { width:100%;background:rgba(248,113,113,0.05);border:1px solid rgba(248,113,113,0.2);color:var(--red);padding:14px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;transition:all 0.18s;position:relative;overflow:hidden; }
        .attack-btn:hover { background:rgba(248,113,113,0.1);border-color:rgba(248,113,113,0.45);box-shadow:0 0 30px rgba(248,113,113,0.1); }
        .attack-btn:active { transform:scale(0.99); }

        .sep { height:1px;background:var(--border);margin:20px 0; }

        .field { position:relative;margin-bottom:8px; }
        .field-caret { position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:0.75rem;pointer-events:none; }

        input[type=text] { width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text-bright);padding:13px 14px 13px 30px;font-family:'JetBrains Mono',monospace;font-size:0.7rem;letter-spacing:0.04em;outline:none;transition:all 0.18s; }
        input::placeholder { color:var(--text-dim); }
        input:focus { border-color:rgba(126,184,247,0.35);background:rgba(126,184,247,0.03);box-shadow:0 0 0 3px rgba(126,184,247,0.06); }

        .log-box { border:1px solid var(--border);overflow:hidden;background:var(--surface2); }
        .log-hdr { padding:8px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.01); }
        .log-hdr-title { font-size:0.58rem;color:var(--text-dim);letter-spacing:0.15em; }
        .log-clr-btn { font-size:0.58rem;color:var(--text-dim);cursor:pointer;background:none;border:none;font-family:inherit;letter-spacing:0.1em;transition:color 0.15s; }
        .log-clr-btn:hover { color:var(--text); }
        #log { height:90px;overflow-y:auto;padding:10px 14px;font-size:0.63rem;line-height:1.9;color:var(--text-dim);scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.05) transparent; }
        .l-ok   { color:var(--green); }
        .l-err  { color:var(--red); }
        .l-warn { color:var(--orange); }
        .l-info { color:var(--blue-dim); }

        .ftr { padding:10px 22px;border-top:1px solid var(--border);display:flex;justify-content:space-between; }
        .ftr span { font-size:0.58rem;color:var(--text-dim);letter-spacing:0.08em; }
        #clock { color:rgba(126,184,247,0.4); }
    </style>
</head>
<body>

<div class="ambient a1"></div>
<div class="ambient a2"></div>

<div id="fs-overlay">
    <canvas id="fs-canvas"></canvas>
    <div id="fs-scanlines"></div>
    <div id="fs-text">
        <div id="fs-label"></div>
        <div id="fs-sub"></div>
        <div id="fs-countdown"></div>
    </div>
</div>

<div class="card">
    <div class="hdr">
        <div class="hdr-left">
            <div class="logo"><div class="logo-inner"></div></div>
            <span class="title">X8_CMD</span>
        </div>
        <div class="online-badge"><div class="online-dot"></div>ONLINE</div>
    </div>

    <div class="body">
        <div class="mode-card state-idle" id="mode-card">
            <div class="mode-meta">
                <span class="mode-label">// CURRENT STATE</span>
                <span class="mode-value state-idle" id="mode-value">STANDBY</span>
            </div>
            <span class="countdown" id="countdown"></span>
        </div>

        <div class="sec-lbl"><span>MOVEMENT</span></div>
        <div class="ctrl-row">
            <button class="ctrl-btn" onclick="send('IDLE')">
                <span class="n">// 01</span><span class="l">■ IDLE</span><span class="s">停止動作</span>
            </button>
            <button class="ctrl-btn" onclick="send('RUNNING')">
                <span class="n">// 02</span><span class="l">▲ JUMP</span><span class="s">跳躍模式</span>
            </button>
        </div>
        <button class="retreat-btn" onclick="handleRetreat()">
            <span>⚠ EMERGENCY RETREAT &ensp;·&ensp; 全體撤退 [TP]</span>
        </button>

        <div class="sec-lbl"><span>TARGET ACQUISITION</span></div>
        <div class="field">
            <span class="field-caret">›</span>
            <input type="text" id="jobid-input" placeholder="paste target job_id ...">
        </div>
        <button class="attack-btn" onclick="handleAttack()">
            ⚡ &ensp; EXECUTE ATTACK &ensp;·&ensp; 發動進攻
        </button>

        <div class="sep"></div>

        <div class="log-box">
            <div class="log-hdr">
                <span class="log-hdr-title">SYS_LOG</span>
                <button class="log-clr-btn" onclick="clearLog()">[ clear ]</button>
            </div>
            <div id="log">
                <span style="color:#1e3a5f">[init] x8 commander v6 loaded</span><br>
                <span style="color:#1e3a5f">[sys ] awaiting input...</span><br>
            </div>
        </div>
    </div>

    <div class="ftr">
        <span>X8 PRODUCTION · V2.0</span>
        <span id="clock">--:--:--</span>
    </div>
</div>

<script>
const SB_URL = "https://eimkojcgfsjlbxxpiiuh.supabase.co/rest/v1/alt_control?id=eq.1";
const SB_KEY = "sb_publishable_nRNFb0Vc796L82oggdgOLA_U-d78rPo";

setInterval(() => { document.getElementById('clock').textContent = new Date().toTimeString().slice(0,8); }, 1000);
function ts() { return new Date().toTimeString().slice(0,8); }
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function appendLog(msg, cls='') {
    const log = document.getElementById('log');
    const span = document.createElement('span');
    if (cls) span.className = cls;
    span.textContent = `[${ts()}] ${msg}`;
    log.appendChild(span);
    log.appendChild(document.createElement('br'));
    log.scrollTop = log.scrollHeight;
}
function clearLog() { document.getElementById('log').innerHTML = ''; }

function setModeUI(mode) {
    const card = document.getElementById('mode-card');
    const val  = document.getElementById('mode-value');
    card.className = 'mode-card';
    val.className  = 'mode-value';
    if (mode === 'RETREAT') {
        card.classList.add('state-retreat'); val.classList.add('state-retreat'); val.textContent = 'RETREATING';
    } else if (mode === 'ATTACK') {
        card.classList.add('state-attack');  val.classList.add('state-attack');  val.textContent = 'ATTACKING';
    } else {
        card.classList.add('state-idle');    val.classList.add('state-idle');    val.textContent = mode === 'RUNNING' ? 'JUMPING' : mode;
    }
}

let cdTimer = null;
function startCountdown(s, cb) {
    const el = document.getElementById('countdown');
    if (cdTimer) clearInterval(cdTimer);
    let t = s;
    el.className = 'countdown active';
    el.textContent = `→ IDLE in ${t}s`;
    cdTimer = setInterval(() => {
        t--;
        if (t <= 0) { clearInterval(cdTimer); el.textContent = ''; el.className = 'countdown'; cb(); }
        else el.textContent = `→ IDLE in ${t}s`;
    }, 1000);
}

async function send(mode, extra = {}) {
    setModeUI(mode);
    try {
        const res = await fetch(SB_URL, {
            method:'PATCH',
            headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json'},
            body: JSON.stringify({command:mode, updated_at:new Date().toISOString(), ...extra})
        });
        appendLog(res.ok ? `ack << ${mode.toLowerCase()} synced` : `nack << http ${res.status}`, res.ok ? 'l-ok' : 'l-err');
    } catch { appendLog('fatal :: connection lost','l-err'); }
}

/* ═══════════════════════════════════════════════════════
   EFFECT ENGINE
═══════════════════════════════════════════════════════ */
const overlay   = document.getElementById('fs-overlay');
const fsCanvas  = document.getElementById('fs-canvas');
const fsLabel   = document.getElementById('fs-label');
const fsSub     = document.getElementById('fs-sub');
const fsCd      = document.getElementById('fs-countdown');
let ctx, animId, fsActive = false;
let particles = [], overlayAlpha = 0, bgR=0, bgG=0, bgB=0;

function initCanvas() {
    fsCanvas.width  = window.innerWidth;
    fsCanvas.height = window.innerHeight;
    ctx = fsCanvas.getContext('2d');
}

/* ── dismiss ── */
function dismissOverlay() {
    return new Promise(res => {
        let a = 1;
        const fade = setInterval(() => {
            a -= 0.05;
            overlay.style.opacity = Math.max(0, a);
            if (a <= 0) {
                clearInterval(fade);
                cancelAnimationFrame(animId);
                overlay.classList.remove('active');
                overlay.style.opacity = '';
                fsActive = false;
                res();
            }
        }, 16);
    });
}

/* ════════════════════════════════════════════════════
   RETREAT EFFECT
   Concept: energy is LEAVING — pull, dissolve, evacuate
   Colors: cool cyan fading to dark navy
   Motion: particles drift OUTWARD toward corners,
           streaks pull away, center empties
════════════════════════════════════════════════════ */

class RetreatParticle {
    constructor() {
        const W = fsCanvas.width, H = fsCanvas.height;
        // Start near center with spread
        this.x = W/2 + (Math.random()-0.5)*180;
        this.y = H/2 + (Math.random()-0.5)*180;

        // Direction: AWAY from center — pulling backward
        const angle = Math.atan2(this.y - H/2, this.x - W/2) + (Math.random()-0.5)*0.8;
        const spd   = 1.5 + Math.random() * 5;
        this.vx = Math.cos(angle) * spd;
        this.vy = Math.sin(angle) * spd;

        this.type = Math.random() < 0.3 ? 'streak'
                  : Math.random() < 0.5 ? 'square'
                  : 'dot';

        this.alpha   = 0.7 + Math.random()*0.3;
        this.life    = 0;
        this.maxLife = 90 + Math.random()*80;
        this.size    = this.type === 'streak' ? 1.5 + Math.random()*1.5
                     : this.type === 'square' ? 3 + Math.random()*5
                     : 1.5 + Math.random()*2;
        this.decay   = 0.008 + Math.random()*0.006; // fade over time — leaving less behind

        // Cyan → amber → nothing palette
        const pick = Math.random();
        this.color = pick < 0.5 ? '#22d3ee'
                   : pick < 0.75 ? '#67e8f9'
                   : '#f59e0b';
    }
    update() {
        // Accelerate outward (pulled away)
        this.vx *= 1.03;
        this.vy *= 1.03;
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= this.decay;
        this.life++;
    }
    draw() {
        if (this.alpha <= 0) return;
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.alpha);

        if (this.type === 'streak') {
            // Long trailing line in direction of travel
            const len = Math.hypot(this.vx, this.vy) * 6;
            const ang = Math.atan2(this.vy, this.vx);
            ctx.strokeStyle = this.color;
            ctx.lineWidth   = this.size;
            ctx.shadowBlur  = 6; ctx.shadowColor = this.color;
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x - Math.cos(ang)*len, this.y - Math.sin(ang)*len);
            ctx.stroke();
        } else if (this.type === 'square') {
            // Breaking grid fragment
            ctx.fillStyle  = this.color;
            ctx.shadowBlur = 4; ctx.shadowColor = this.color;
            ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
        } else {
            ctx.fillStyle  = this.color;
            ctx.shadowBlur = 8; ctx.shadowColor = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
            ctx.fill();
        }
        ctx.restore();
    }
    dead() { return this.alpha <= 0 || this.life > this.maxLife; }
}

// Ghost grid that dissolves outward
class GridFragment {
    constructor() {
        const W = fsCanvas.width, H = fsCanvas.height;
        const cols = 12, rows = 8;
        const cw = W / cols, ch = H / rows;
        const col = Math.floor(Math.random()*cols);
        const row = Math.floor(Math.random()*rows);
        this.x = col * cw + cw/2;
        this.y = row * ch + ch/2;
        this.w = cw * (0.6 + Math.random()*0.3);
        this.h = ch * (0.4 + Math.random()*0.3);

        const angle = Math.atan2(this.y - H/2, this.x - W/2);
        const spd   = 0.3 + Math.random()*1.2;
        this.vx = Math.cos(angle) * spd;
        this.vy = Math.sin(angle) * spd;

        this.alpha   = 0.08 + Math.random()*0.12;
        this.maxLife = 120 + Math.random()*100;
        this.life    = 0;
        this.delay   = Math.random() * 60; // staggered appearance
    }
    update() {
        if (this.life < this.delay) { this.life++; return; }
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= 0.0008;
        this.life++;
    }
    draw() {
        if (this.life < this.delay || this.alpha <= 0) return;
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.alpha);
        ctx.strokeStyle = '#22d3ee';
        ctx.lineWidth   = 0.5;
        ctx.strokeRect(this.x - this.w/2, this.y - this.h/2, this.w, this.h);
        ctx.restore();
    }
    dead() { return this.life > this.maxLife || this.alpha <= 0; }
}

let retreatParticles = [], gridFragments = [];
let retreatBgAlpha = 0;

function retreatLoop() {
    animId = requestAnimationFrame(retreatLoop);
    const W = fsCanvas.width, H = fsCanvas.height;

    // Background — dark navy, gradually clearing
    retreatBgAlpha = Math.min(0.94, retreatBgAlpha + 0.04);
    ctx.fillStyle = `rgba(1, 8, 20, ${retreatBgAlpha})`;
    ctx.fillRect(0, 0, W, H);

    // Subtle vignette — darkness at edges (evacuation zone)
    const vig = ctx.createRadialGradient(W/2, H/2, H*0.1, W/2, H/2, H*0.85);
    vig.addColorStop(0, 'rgba(0,0,0,0)');
    vig.addColorStop(1, 'rgba(0,5,15,0.7)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, W, H);

    gridFragments   = gridFragments.filter(g => { g.update(); g.draw(); return !g.dead(); });
    retreatParticles = retreatParticles.filter(p => { p.update(); p.draw(); return !p.dead(); });

    // Periodic injection — particles keep spawning then slow down (draining)
    if (retreatParticles.length < 60 && Math.random() < 0.4)
        retreatParticles.push(new RetreatParticle());
}

async function showRetreatEffect(afterDone) {
    fsActive = true;
    initCanvas();
    retreatParticles = []; gridFragments = []; retreatBgAlpha = 0;
    overlay.style.opacity = '1';
    overlay.classList.add('active');

    // Spawn grid fragments — UI panels shutting down
    for (let i = 0; i < 40; i++) gridFragments.push(new GridFragment());
    // Initial particle burst
    for (let i = 0; i < 120; i++) retreatParticles.push(new RetreatParticle());

    retreatLoop();

    // Text — cold cyan, thin
    fsLabel.style.cssText = `
        color:#22d3ee;
        text-shadow: 0 0 40px rgba(34,211,238,0.6), 0 0 80px rgba(34,211,238,0.2);
        opacity:0; transition: opacity 0.4s ease;
    `;
    fsLabel.textContent = '⚠ RETREAT';
    fsSub.style.cssText  = `color:rgba(34,211,238,0.45); opacity:0; transition: opacity 0.5s ease 0.15s;`;
    fsSub.textContent    = '全體撤退 · SIGNAL FADING · EVACUATING ALL UNITS';
    fsCd.style.cssText   = `color:rgba(34,211,238,0.7); opacity:0; transition: opacity 0.3s ease;`;
    fsCd.textContent     = '';

    await delay(200);
    fsLabel.style.opacity = '1';
    await delay(150);
    fsSub.style.opacity   = '1';

    // Countdown
    await delay(600);
    let t = 3;
    fsCd.style.opacity = '1';
    fsCd.textContent = `EVACUATING  ·  ${t}`;

    await new Promise(res => {
        const cd = setInterval(() => {
            t--;
            // Each tick: extra drain burst
            for (let i=0;i<30;i++) retreatParticles.push(new RetreatParticle());
            if (t <= 0) {
                clearInterval(cd);
                fsCd.textContent = 'SIGNAL LOST · RETURNING...';
                res();
            } else {
                fsCd.textContent = `EVACUATING  ·  ${t}`;
            }
        }, 1000);
    });

    await delay(600);
    // Fade everything out — the scene goes empty
    await dismissOverlay();
    afterDone();
}

/* ════════════════════════════════════════════════════
   ATTACK EFFECT
   Concept: force is ENTERING — lock, strike, fracture
   Colors: white flash → red → crimson debris
   Motion: converging lines INWARD, impact rings,
           cracks, shards fly OUT from hit point
════════════════════════════════════════════════════ */

class AttackShard {
    constructor(cx, cy) {
        const angle = Math.random() * Math.PI*2;
        const spd   = 3 + Math.random()*16;
        this.x = cx + (Math.random()-0.5)*30;
        this.y = cy + (Math.random()-0.5)*30;
        this.vx = Math.cos(angle) * spd;
        this.vy = Math.sin(angle) * spd;
        this.gravity = 0.18;
        this.alpha   = 1;
        this.maxLife = 50 + Math.random()*60;
        this.life    = 0;
        this.type    = Math.random() < 0.4 ? 'spike' : Math.random() < 0.6 ? 'block' : 'spark';
        this.size    = this.type === 'spike'  ? 2 + Math.random()*3
                     : this.type === 'block'  ? 4 + Math.random()*8
                     : 1.5 + Math.random()*2;
        this.rot  = Math.random()*Math.PI*2;
        this.rotV = (Math.random()-0.5)*0.3;
        const pick = Math.random();
        this.color = pick < 0.4 ? '#ffffff'
                   : pick < 0.65 ? '#f87171'
                   : pick < 0.85 ? '#fca5a5'
                   : '#ef4444';
    }
    update() {
        this.vx *= 0.95; this.vy *= 0.95;
        this.vy += this.gravity;
        this.x += this.vx; this.y += this.vy;
        this.rot += this.rotV;
        this.life++;
        this.alpha = Math.pow(1 - this.life/this.maxLife, 1.8);
    }
    draw() {
        if (this.alpha <= 0) return;
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.alpha);
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rot);
        ctx.shadowBlur = 10; ctx.shadowColor = this.color;
        if (this.type === 'spike') {
            ctx.strokeStyle = this.color; ctx.lineWidth = this.size * 0.5;
            ctx.beginPath();
            ctx.moveTo(-this.size*4, 0); ctx.lineTo(this.size*4, 0);
            ctx.moveTo(0, -this.size*4); ctx.lineTo(0, this.size*4);
            ctx.stroke();
        } else if (this.type === 'block') {
            ctx.fillStyle = this.color;
            ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
        } else {
            ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(0, 0, this.size, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();
    }
    dead() { return this.alpha <= 0 || this.life > this.maxLife; }
}

// Converging strike lines — rush INWARD toward center
class StrikeLine {
    constructor(cx, cy) {
        const W = fsCanvas.width, H = fsCanvas.height;
        // Spawn at edge
        const side = Math.floor(Math.random()*4);
        if (side === 0)      { this.x = Math.random()*W; this.y = -10; }
        else if (side === 1) { this.x = W+10; this.y = Math.random()*H; }
        else if (side === 2) { this.x = Math.random()*W; this.y = H+10; }
        else                 { this.x = -10; this.y = Math.random()*H; }

        const dx = cx - this.x, dy = cy - this.y;
        const dist = Math.hypot(dx, dy);
        const spd  = 12 + Math.random()*20;
        this.vx = (dx/dist) * spd;
        this.vy = (dy/dist) * spd;
        this.cx = cx; this.cy = cy;
        this.alpha = 0.8 + Math.random()*0.2;
        this.life  = 0;
        this.maxLife = Math.ceil(dist / spd) + 4;
        this.len   = 30 + Math.random()*80;
        this.color = Math.random() < 0.5 ? '#ffffff' : '#fca5a5';
        this.width = 0.8 + Math.random()*1.5;
        this.hit   = false;
    }
    update() {
        const dx = this.cx - this.x, dy = this.cy - this.y;
        if (Math.hypot(dx, dy) < 20 && !this.hit) this.hit = true;
        if (!this.hit) { this.x += this.vx; this.y += this.vy; }
        this.alpha -= 0.04;
        this.life++;
    }
    draw() {
        if (this.alpha <= 0) return;
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.alpha);
        const ang = Math.atan2(this.vy, this.vx);
        ctx.strokeStyle = this.color;
        ctx.lineWidth   = this.width;
        ctx.shadowBlur  = 12; ctx.shadowColor = this.color;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x - Math.cos(ang)*this.len, this.y - Math.sin(ang)*this.len);
        ctx.stroke();
        ctx.restore();
    }
    dead() { return this.alpha <= 0 || this.life > this.maxLife + 10; }
}

// Shockwave ring — expands OUT from impact
class ImpactRing {
    constructor(cx, cy, color, delay_ms) {
        this.cx = cx; this.cy = cy;
        this.r = 0;
        this.maxR = Math.max(fsCanvas.width, fsCanvas.height) * 0.75;
        this.alpha = 0.9;
        this.color = color;
        this.spd   = 25 + Math.random()*15;
        this.lw    = 2;
        this.alive = false;
        setTimeout(() => { this.alive = true; }, delay_ms);
    }
    update() {
        if (!this.alive) return;
        this.r += this.spd;
        this.alpha = Math.max(0, 0.9 * (1 - this.r/this.maxR));
        this.lw = Math.max(0.5, 2.5 * (1 - this.r/this.maxR));
    }
    draw() {
        if (!this.alive || this.alpha <= 0) return;
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.strokeStyle = this.color;
        ctx.lineWidth   = this.lw;
        ctx.shadowBlur  = 20; ctx.shadowColor = this.color;
        ctx.beginPath(); ctx.arc(this.cx, this.cy, this.r, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
    }
    dead() { return this.alive && this.r >= this.maxR; }
}

let attackShards=[], strikeLines=[], impactRings=[];
let attackBgAlpha=0, flashAlpha=0;

function attackLoop() {
    animId = requestAnimationFrame(attackLoop);
    const W = fsCanvas.width, H = fsCanvas.height;

    // Deep dark bg with red tint
    attackBgAlpha = Math.min(0.96, attackBgAlpha + 0.06);
    ctx.fillStyle = `rgba(8, 1, 1, ${attackBgAlpha})`;
    ctx.fillRect(0, 0, W, H);

    // Impact white flash at center — fades fast
    if (flashAlpha > 0) {
        const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, H*0.5);
        grad.addColorStop(0, `rgba(255,255,255,${flashAlpha})`);
        grad.addColorStop(0.3, `rgba(255,80,80,${flashAlpha*0.4})`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
        flashAlpha = Math.max(0, flashAlpha - 0.025);
    }

    strikeLines  = strikeLines.filter(l => { l.update(); l.draw(); return !l.dead(); });
    impactRings  = impactRings.filter(r => { r.update(); r.draw(); return !r.dead(); });
    attackShards = attackShards.filter(s => { s.update(); s.draw(); return !s.dead(); });
}

async function showAttackEffect(jobId, afterDone) {
    fsActive = true;
    initCanvas();
    attackShards=[]; strikeLines=[]; impactRings=[]; attackBgAlpha=0; flashAlpha=0;
    overlay.style.opacity = '1';
    overlay.classList.add('active');
    attackLoop();

    const cx = fsCanvas.width/2, cy = fsCanvas.height/2;

    // Phase 1: Strike lines converge inward (anticipation)
    for (let i = 0; i < 18; i++) {
        setTimeout(() => strikeLines.push(new StrikeLine(cx, cy)), i * 30);
    }

    // Phase 2: Impact moment — white flash + shards explode outward
    await delay(400);
    flashAlpha = 0.95;
    for (let i = 0; i < 280; i++) attackShards.push(new AttackShard(cx, cy));

    // Shockwave rings from impact point
    impactRings.push(new ImpactRing(cx, cy, '#ffffff', 0));
    impactRings.push(new ImpactRing(cx, cy, '#f87171', 80));
    impactRings.push(new ImpactRing(cx, cy, '#ef4444', 200));
    impactRings.push(new ImpactRing(cx, cy, '#fca5a5', 360));

    // More strike lines keep coming after impact
    for (let i = 0; i < 12; i++) {
        setTimeout(() => strikeLines.push(new StrikeLine(cx, cy)), 400 + i * 50);
    }

    // Text
    fsLabel.style.cssText = `
        color:#ffffff;
        text-shadow: 0 0 30px rgba(255,255,255,0.9), 0 0 60px rgba(248,113,113,0.7), 0 0 100px rgba(248,113,113,0.4);
        opacity:0; transition: opacity 0.15s ease;
    `;
    fsLabel.textContent = '⚡ ATTACK';
    fsSub.style.cssText  = `color:rgba(252,165,165,0.6); opacity:0; transition:opacity 0.3s ease 0.1s;`;
    fsSub.textContent    = `TARGET BREACHED · ${jobId.length>28 ? jobId.slice(0,28)+'…' : jobId}`;
    fsCd.style.cssText   = `color:#f87171; opacity:0; transition:opacity 0.25s ease;`;
    fsCd.textContent     = '';

    await delay(350);
    fsLabel.style.opacity = '1';
    await delay(150);
    fsSub.style.opacity   = '1';

    await delay(500);
    let t = 3;
    fsCd.style.opacity = '1';
    fsCd.textContent = `DAMAGE CONFIRMED  ·  ${t}`;

    await new Promise(res => {
        const cd = setInterval(() => {
            t--;
            // Aftershock rings
            impactRings.push(new ImpactRing(cx, cy, '#ef4444', 0));
            for (let i=0;i<40;i++) attackShards.push(new AttackShard(cx, cy));
            if (t <= 0) {
                clearInterval(cd);
                fsCd.textContent = 'IMPACT COMPLETE · RESETTING...';
                res();
            } else {
                fsCd.textContent = `DAMAGE CONFIRMED  ·  ${t}`;
            }
        }, 1000);
    });

    await delay(500);
    await dismissOverlay();
    afterDone();
}

/* ════ HANDLERS ════ */
let fsActive_guard = false;

async function handleRetreat() {
    if (fsActive) return;
    appendLog('⚠ emergency retreat initiated', 'l-err');
    await send('RETREAT');
    showRetreatEffect(async () => {
        await send('IDLE');
        appendLog('auto-reset >> idle', 'l-info');
    });
}

async function handleAttack() {
    if (fsActive) return;
    const jobId = document.getElementById('jobid-input').value.trim();
    if (!jobId) { appendLog('err :: no target job_id specified','l-err'); return; }
    appendLog(`target locked >> ${jobId.slice(0,24)}`,'l-warn');
    await send('ATTACK', {target_job_id: jobId});
    showAttackEffect(jobId, async () => {
        await send('IDLE');
        appendLog('auto-reset >> idle','l-info');
    });
}

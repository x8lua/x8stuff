<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nope</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050505; }
    body { font-family: 'Google Sans', sans-serif; color: #f0ede8; }
    .bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(circle at center, rgba(160, 0, 0, 0.22), transparent 42%), #050505; }
    .bg::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, rgba(255,255,255,0.035), rgba(255,255,255,0.035) 1px, transparent 1px, transparent 4px); opacity: 0.4; }
    .bg img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1) brightness(0.05) contrast(1.4); opacity: 0.65; }
    .stage { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; text-align: center; }
    .logo { font-weight: 700; font-style: italic; font-size: clamp(5rem, 14vw, 11rem); color: rgba(240,237,232,0.88); letter-spacing: -0.04em; line-height: 0.9; user-select: none; text-shadow: 0 0 30px rgba(255,0,0,0.28); opacity: 0; animation: appear 0.75s ease forwards; }
    .panel { width: min(820px, 92vw); margin-top: 24px; border: 1px solid rgba(255, 30, 30, 0.55); background: rgba(0,0,0,0.62); box-shadow: 0 0 42px rgba(255,0,0,0.13), inset 0 0 30px rgba(255,0,0,0.06); padding: 28px; opacity: 0; transform: translateY(8px); animation: appearPanel 0.9s ease 0.25s forwards; }
    .tag { display: inline-block; border: 1px solid rgba(255,40,40,0.7); color: #ff3535; padding: 6px 10px; font-size: 0.68rem; letter-spacing: 0.32em; text-transform: uppercase; margin-bottom: 18px; }
    h1 { font-size: clamp(1.8rem, 5vw, 4.6rem); font-weight: 700; line-height: 1; letter-spacing: -0.04em; color: #fff; text-shadow: 2px 0 #ff0033, -2px 0 #0055ff; }
    .main { margin-top: 18px; font-size: clamp(0.95rem, 2vw, 1.25rem); letter-spacing: 0.06em; color: rgba(240,237,232,0.78); }
    .sub { margin-top: 14px; font-size: clamp(0.7rem, 1.5vw, 0.9rem); letter-spacing: 0.16em; color: rgba(255, 80, 80, 0.72); text-transform: uppercase; }
    .receipt { margin: 22px auto 0; width: min(520px, 100%); font-family: 'Courier New', monospace; font-size: 0.78rem; color: rgba(240,237,232,0.55); text-align: left; border-top: 1px solid rgba(255,255,255,0.12); padding-top: 16px; line-height: 1.8; }
    .receipt b { color: #ff3b3b; font-weight: 400; }
    .back { display: inline-block; margin-top: 24px; color: #050505; background: #ff2b2b; text-decoration: none; padding: 10px 18px; border-radius: 999px; font-weight: 700; font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase; box-shadow: 0 0 24px rgba(255,43,43,0.3); }
    .vol { position: fixed; bottom: 30px; right: 34px; z-index: 20; font-size: 0.58rem; letter-spacing: 0.24em; color: rgba(240,237,232,0.22); text-transform: uppercase; }
    @keyframes appear { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes appearPanel { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="bg"><img src="/pics/lobby.jpg" alt=""></div>
  <div class="stage">
    <div class="logo">x8</div>
    <section class="panel">
      <div class="tag">identity check failed</div>
      <h1>You really thought that was going to work :)</h1>
      <p class="main">Valid login. Wrong person.</p>
      <p class="sub">The velvet rope remains undefeated.</p>
      <div class="receipt">
        <div>&gt; session: <b>real</b></div>
        <div>&gt; access: <b>nope</b></div>
        <div>&gt; confidence: <b>adorable</b></div>
        <div>&gt; advice: try being on the list next time.</div>
      </div>
      <a class="back" href="/index.html">back to safety</a>
    </section>
  </div>
  <div class="vol">nope protocol active</div>
</body>
</html>

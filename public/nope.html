<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>denied</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    body { font-family: 'Share Tech Mono', monospace; color: #b8ffbf; }
    .bg { position: fixed; inset: 0; background: #000; }
    .bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(120,0,0,0.25), transparent 34%),
        linear-gradient(rgba(0,255,90,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,90,0.025) 1px, transparent 1px);
      background-size: auto, 32px 32px, 32px 32px;
      opacity: 0.85;
    }
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, rgba(255,255,255,0.035), rgba(255,255,255,0.035) 1px, transparent 1px, transparent 4px);
      animation: scan 5s linear infinite;
      opacity: 0.45;
    }
    .stage { position: fixed; inset: 0; display: grid; place-items: center; padding: 28px; }
    .box {
      width: min(780px, 92vw);
      border: 1px solid rgba(255, 25, 25, 0.75);
      background: rgba(2, 0, 0, 0.82);
      box-shadow: 0 0 80px rgba(255,0,0,0.18), inset 0 0 45px rgba(255,0,0,0.08);
      padding: clamp(28px, 6vw, 58px);
      text-align: left;
      animation: boot 0.7s ease forwards;
    }
    .topline {
      color: #ff2d2d;
      font-size: clamp(0.75rem, 1.6vw, 0.95rem);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    h1 {
      color: #fff;
      font-size: clamp(2.4rem, 8vw, 6.2rem);
      line-height: 0.92;
      letter-spacing: -0.06em;
      text-transform: uppercase;
      text-shadow: 3px 0 #ff0000, -3px 0 #00ff66, 0 0 34px rgba(255,0,0,0.45);
      animation: glitch 3.5s infinite;
    }
    .message {
      margin-top: 26px;
      color: rgba(184,255,191,0.82);
      font-size: clamp(1rem, 2.4vw, 1.35rem);
      letter-spacing: 0.08em;
    }
    .message span { color: #ff2d2d; }
    .line {
      margin-top: 28px;
      height: 1px;
      background: linear-gradient(90deg, #ff2d2d, transparent);
      opacity: 0.7;
    }
    .back {
      display: inline-block;
      margin-top: 24px;
      color: rgba(184,255,191,0.5);
      text-decoration: none;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .corner { position: fixed; bottom: 22px; right: 24px; color: rgba(255,45,45,0.42); font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; }
    @keyframes boot { from { opacity: 0; transform: scale(0.985) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    @keyframes scan { from { transform: translateY(-18px); } to { transform: translateY(18px); } }
    @keyframes glitch { 0%, 92%, 100% { transform: translate(0); } 93% { transform: translate(4px, -2px); } 94% { transform: translate(-5px, 1px); } 95% { transform: translate(2px, 2px); } }
  </style>
</head>
<body>
  <div class="bg"></div>
  <main class="stage">
    <section class="box">
      <div class="topline">unauthorized identity detected</div>
      <h1>Nice try.</h1>
      <p class="message">But you <span>failed</span>.</p>
      <div class="line"></div>
      <a class="back" href="/index.html">leave</a>
    </section>
  </main>
  <div class="corner">access denied</div>
</body>
</html>

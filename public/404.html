  66% { transform: translate(-20px, 40px) scale(0.95); }
}

@keyframes scan {

}

body::after {

#bgfade {

<script>
const $ = id => document.getElementById(id);
const delay = (fn, ms) => setTimeout(fn, ms);

const cursor = $('cursor');
const ring = $('cursor-ring');
let mx = innerWidth / 2;
let my = innerHeight / 2;
let rx = mx;
let ry = my;

document.addEventListener('mousemove', e => {
  mx = e.clientX;
  my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top = my + 'px';
});

(function lerpRing() {
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  ring.style.left = rx + 'px';
  ring.style.top = ry + 'px';
  requestAnimationFrame(lerpRing);
})();

[$('homeBtn'), $('backBtn')].forEach(el => {
  el.addEventListener('mouseenter', () => {
    cursor.style.width = '4px';
    cursor.style.height = '4px';
    ring.style.width = '52px';
    ring.style.height = '52px';
  });
  el.addEventListener('mouseleave', () => {
    cursor.style.width = '8px';
    cursor.style.height = '8px';
    ring.style.width = '36px';
    ring.style.height = '36px';
  });
});

const gc = $('grid-canvas');
const gctx = gc.getContext('2d');

function resizeGrid() {
  gc.width = innerWidth;
  gc.height = innerHeight;
}
resizeGrid();
window.addEventListener('resize', resizeGrid);

let gridOffset = 0;

(function drawGrid() {
  gctx.clearRect(0, 0, gc.width, gc.height);
  gctx.strokeStyle = 'rgba(255,255,255,0.04)';
  gctx.lineWidth = 0.5;

  const size = 60;
  const off = gridOffset % size;

  for (let x = -size + off; x < gc.width + size; x += size) {
    gctx.beginPath();
    gctx.moveTo(x, 0);
    gctx.lineTo(x, gc.height);
    gctx.stroke();
  }
  for (let y = -size + off; y < gc.height + size; y += size) {
    gctx.beginPath();
    gctx.moveTo(0, y);
    gctx.lineTo(gc.width, y);
    gctx.stroke();
  }

  const grad = gctx.createRadialGradient(mx, my, 0, mx, my, 300);
  grad.addColorStop(0, 'rgba(200,245,96,0.04)');
  grad.addColorStop(1, 'transparent');
  gctx.fillStyle = grad;
  gctx.fillRect(0, 0, gc.width, gc.height);

  gridOffset += 0.3;
  requestAnimationFrame(drawGrid);
})();

const pc = $('particles');
const pctx = pc.getContext('2d');

function resizeParticles() {
  pc.width = innerWidth;
  pc.height = innerHeight;
}
resizeParticles();
window.addEventListener('resize', resizeParticles);

const particles = Array.from({ length: 40 }, () => ({
  x: Math.random() * innerWidth,
  y: Math.random() * innerHeight,
  r: Math.random() * 1.5 + 0.3,
  vx: (Math.random() - 0.5) * 0.3,
  vy: (Math.random() - 0.5) * 0.3,
  o: Math.random() * 0.4 + 0.05,
  c: Math.random() > 0.7 ? '200,245,96' : '96,213,245'
}));

(function drawParticles() {
  pctx.clearRect(0, 0, pc.width, pc.height);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0) p.x = pc.width;
    if (p.x > pc.width) p.x = 0;
    if (p.y < 0) p.y = pc.height;
    if (p.y > pc.height) p.y = 0;
    pctx.beginPath();
    pctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    pctx.fillStyle = `rgba(${p.c},${p.o})`;
    pctx.fill();
  });
  requestAnimationFrame(drawParticles);
})();

const pathEl = document.querySelector('.path-url');
if (location.pathname && location.pathname !== '/') {
  pathEl.textContent = 'x8stuff.lol' + location.pathname;
}

$('ig').classList.add('on');

delay(() => {
  ['h1', 'h2', 'h3', 'h4'].forEach(id => $(id).classList.add('on'));
  ['bk-tl', 'bk-tr', 'bk-bl', 'bk-br'].forEach(id => $(id).classList.add('on'));
}, 150);

delay(() => $('icross').classList.add('on'), 320);

delay(() => $('ghost').querySelector('span').classList.add('on'), 500);

delay(() => $('itag').classList.add('on'), 1000);

delay(() => $('islam').classList.add('on'), 1400);

delay(() => {
  $('iflash').classList.add('on');
  $('ispeed').classList.add('on');
  document.querySelectorAll('.sring').forEach(r => r.classList.add('on'));
  document.body.classList.add('shake');
  delay(() => document.body.classList.remove('shake'), 450);
}, 1420);

delay(() => $('bgfade').classList.add('on'), 2200);

delay(() => {
  const slam = $('islam');
  const sp = slam.querySelector('span');

  slam.style.animation = 'none';
  sp.style.animation = 'none';
  sp.style.transform = 'scale(1) translateY(0)';
  slam.style.opacity = '1';
  slam.style.transform = 'none';
  slam.offsetHeight;

  const intro = $('intro');
  intro.style.transition = 'opacity 0.85s ease';
  slam.style.transition = 'opacity 0.85s ease, transform 0.85s cubic-bezier(0.4, 0, 1, 1)';
  sp.style.transition = 'transform 0.85s cubic-bezier(0.4, 0, 1, 1)';

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      intro.style.opacity = '0';
      slam.style.opacity = '0';
      slam.style.transform = 'scale(0.06)';
      sp.style.transform = 'scale(0.06)';
    });
  });
}, 2400);

delay(() => $('scene').classList.add('reveal'), 2700);

delay(() => {
  const intro = $('intro');
  if (intro) intro.style.display = 'none';
}, 3300);
</script>
